<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador PRO · Siglo 21 · 2 materias</title>
<style>
:root {
  --primary: #5b2c6f;
  --primary-dark: #4a2358;
  --accent: #f39c12;
  --ok: #27ae60;
  --no: #c0392b;
  --bg: #f4ecf7;
  --card: #ffffff;
  --text: #2c2c2c;
  --muted: #7f8c8d;
  --border: #d7bde2;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
}
header {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  padding: 1.5em 1em;
  border-bottom: 4px solid var(--accent);
  transition: all 0.3s;
}
header h1 { margin: 0; font-size: 1.5em; }
header .sub { opacity: 0.92; margin-top: 0.4em; font-size: 0.95em; }
.container { width: 100%; max-width: 100%; margin: 0 auto; padding: 1em clamp(1em, 4vw, 3em); }
@media (min-width: 1200px) {
  .container { max-width: 1600px; }
  .question .qtext { font-size: 1.1em; }
}

/* TABS de materia */
.tabs {
  display: flex;
  gap: 0.5em;
  margin-bottom: 1em;
  background: var(--card);
  padding: 0.5em;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}
.tab {
  flex: 1;
  padding: 0.8em 1em;
  border: none;
  border-radius: 8px;
  background: transparent;
  color: var(--muted);
  font-weight: 600;
  cursor: pointer;
  font-size: 1em;
  transition: all 0.2s;
}
.tab:hover { background: #faf5fc; }
.tab.active {
  background: var(--primary);
  color: white;
}

.controls {
  background: var(--card);
  padding: 1em;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  margin-bottom: 1em;
  display: flex;
  gap: 0.75em;
  align-items: center;
  flex-wrap: wrap;
}
.controls label { font-weight: 600; color: var(--primary); }
.controls select {
  flex: 1;
  min-width: 240px;
  padding: 0.6em;
  border-radius: 6px;
  border: 2px solid var(--border);
  font-size: 1em;
  background: white;
}
.controls button {
  padding: 0.6em 1.2em;
  border: none;
  border-radius: 6px;
  background: var(--accent);
  color: white;
  font-weight: 600;
  cursor: pointer;
  font-size: 1em;
}
.stats {
  background: var(--card);
  padding: 0.8em;
  border-radius: 10px;
  margin-bottom: 1em;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0.5em;
  text-align: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.06);
}
.stats div { padding: 0.5em; border-radius: 6px; background: #faf5fc; transition: background 0.3s; }
.stats .lbl { display: block; color: var(--muted); font-size: 0.75em; margin-bottom: 0.2em; }
.stats .val { font-weight: 700; font-size: 1.2em; color: var(--primary); }
.stats .val.ok { color: var(--ok); }
.stats .val.no { color: var(--no); }
.question {
  background: var(--card);
  padding: 1.2em;
  border-radius: 10px;
  margin-bottom: 1em;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  border-left: 4px solid var(--primary);
}
.question .num {
  display: inline-block;
  background: var(--primary);
  color: white;
  padding: 0.15em 0.6em;
  border-radius: 4px;
  font-size: 0.8em;
  font-weight: 600;
  margin-right: 0.5em;
}
.question .multi-hint {
  display: inline-block;
  background: var(--accent);
  color: white;
  padding: 0.15em 0.6em;
  border-radius: 4px;
  font-size: 0.75em;
  margin-left: 0.4em;
}
.question .qtext { font-weight: 600; margin: 0.5em 0 1em 0; font-size: 1.02em; }
.options { display: flex; flex-direction: column; gap: 0.5em; }
.option {
  display: block;
  padding: 0.75em 1em;
  border: 2px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
  background: white;
}
.option:hover { border-color: var(--primary); background: #f9f0fc; }
.option input { margin-right: 0.6em; }
.option.correct { border-color: var(--ok); background: #e8f8f0; color: #1e6b3a; font-weight: 600; }
.option.incorrect { border-color: var(--no); background: #fce8e8; color: #8b2c2c; }
.option.disabled { cursor: not-allowed; opacity: 0.7; }
.controls-q { margin-top: 0.8em; display: flex; gap: 0.5em; flex-wrap: wrap; }
.controls-q button {
  padding: 0.5em 1em;
  border: none;
  border-radius: 6px;
  font-weight: 600;
  cursor: pointer;
  font-size: 0.95em;
}
.btn-check { background: var(--primary); color: white; }
.btn-check:disabled { background: #aaa; cursor: not-allowed; }
.summary {
  background: linear-gradient(135deg, #fef9e7, #fcf3cf);
  padding: 1.5em;
  border-radius: 10px;
  border: 2px solid var(--accent);
  text-align: center;
  margin-bottom: 1em;
  display: none;
}
.summary h2 { margin-top: 0; color: var(--primary); }
.summary .nota { font-size: 2.5em; font-weight: 700; color: var(--primary); margin: 0.3em 0; }
.summary .msg { font-style: italic; color: var(--muted); }
footer {
  text-align: center;
  padding: 1.5em 1em;
  color: var(--muted);
  font-size: 0.85em;
}
@media (max-width: 600px) {
  .stats { grid-template-columns: repeat(2, 1fr); }
  .controls select { min-width: 100%; }
  header h1 { font-size: 1.2em; }
  .tab { font-size: 0.9em; padding: 0.6em 0.5em; }
}
</style>
</head>
<body>

<header id="hdr">
  <div class="container">
    <h1 id="hdrTitle">🎓 Simulador PRO · Siglo 21</h1>
    <div class="sub" id="hdrSub">Seleccioná materia</div>
  </div>
</header>

<div class="container">

  <div class="tabs">
    <button class="tab active" id="tab-filosofia" onclick="switchMateria('filosofia')">🎓 Filosofía</button>
    <button class="tab" id="tab-tecnologia" onclick="switchMateria('tecnologia')">💻 Tecnología</button>
  </div>

  <div class="controls">
    <label for="tanda">Tanda:</label>
    <select id="tanda" onchange="cambiarTanda()"></select>
    <button onclick="reiniciar()">↻ Reiniciar</button>
  </div>

  <div class="stats">
    <div><span class="lbl">CORRECTAS</span><span class="val ok" id="ok">0</span></div>
    <div><span class="lbl">INCORRECTAS</span><span class="val no" id="no">0</span></div>
    <div><span class="lbl">PROGRESO</span><span class="val" id="prog">0%</span></div>
    <div><span class="lbl">NOTA /10</span><span class="val" id="nota">—</span></div>
  </div>

  <div id="summary" class="summary">
    <h2>Resultado final</h2>
    <div class="nota" id="finalNota">—</div>
    <div id="finalDetalle"></div>
    <div class="msg" id="finalMsg"></div>
  </div>

  <div id="questions"></div>

</div>

<footer>
  Filosofía: banco NG vigente al 06/05/2026 · Tecnología: combinación de 3 tests Daypo + PDF Sabry/Romy Kei
</footer>

<script>
const MATERIAS = {"filosofia": {"nombre": "Introducción a la Filosofía", "subtitulo": "Segundo Parcial · Banco NG vigente al 06/05/2026", "color1": "#5b2c6f", "color2": "#4a2358", "accent": "#f39c12", "icon": "🎓", "tandas": [{"title": "Nietzsche · Voluntad de poder, eterno retorno, superhombre", "questions": [{"t": "Fermín está estudiando teatro y le toca interpretar, en una obra, al dios griego Apolo. ¿Cuáles son los caracteres de Apolo que describe Nietzsche en El origen de la tragedia griega?", "o": ["Ira y Violencia", "Mensura y Armonía", "Caos y Desorden"], "c": 1, "multi": false}, {"t": "¿Qué ideas se identifican con el núcleo de la filosofía nietzscheana? Selecciona las 3 (tres) opciones correctas", "o": ["El eterno retorno", "La voluntad de poder", "La idea de las formas platónicas", "El superhombre", "La ataraxia"], "c": [0, 1, 3], "multi": true, "n": 3}, {"t": "¿Cuáles de las siguientes expresiones refiere al significado del término poder para Nietzsche? Selecciona las 2 (dos) opciones correctas", "o": ["Los seres humanos quieren afirmarse a sí mismos, descargar su fuerza, expresar su diferencia individual", "Se trata del poder de autotrascenderse", "Consiste en acumular riquezas materiales como fin supremo", "El poder se limita al control político y social sobre otros"], "c": [0, 1], "multi": true, "n": 2}, {"t": "Con su crítica del esencialismo moral, Nietzsche inaugura un nuevo tipo de preguntas. ¿Cuáles de las siguientes realizaría Nietzsche? Seleccione las 3 (tres) opciones correctas:", "o": ["¿Cuál es la ley universal e inmutable de la moral?", "¿En qué medida a alguien le beneficia realizar tales juicios morales?", "¿Qué maneras de vivir predisponen a interpretar el mundo de ese modo?", "¿Quién juzga algo como verdadero o bueno?", "¿Cómo alcanzar el conocimiento objetivo sin perspectiva?"], "c": [1, 2, 3], "multi": true, "n": 3}, {"t": "¿Qué significa la Muerte de Dios?", "o": ["La pérdida de las bases del saber y la moral en la humanidad", "La confirmación de la existencia de un ser supremo", "La eliminación literal de todas las religiones"], "c": 0, "multi": false}, {"t": "Juan no quiere ir más a la iglesia a rezar, porque concuerda con Nietzsche en la idea de que el cristianismo es una moral de esclavos. ¿Por qué Nietzsche realizó tal afirmación?", "o": ["Porque el cristianismo promueve únicamente la libertad y la autoafirmación", "Porque el cristianismo favorece la competencia y la guerra entre los hombres", "Porque la moral cristiana anula la vida terrenal del hombre con la promesa de una vida en el más allá"], "c": 2, "multi": false}, {"t": "La moral auténtica, para Nietzsche, es la moral de los nobles, de los fuertes, afirmación vital creadora que se caracteriza por los siguientes rasgos. Seleccione las 4 (cuatro) opciones correctas", "o": ["Asume el triunfo de los fuertes", "Anclada a la voluntad de poder, voluntad de señorío", "Se basa en la humildad y el sacrificio por los débiles", "Asociada al superhombre", "Es generosa, pero no caritativa"], "c": [0, 1, 3, 4], "multi": true, "n": 4}, {"t": "El superhombre de Nietzsche se caracteriza por aceptar la vida, afirmar la tierra y rechazar toda utopía espiritual.", "o": ["Falso", "Verdadero"], "c": 1, "multi": false}, {"t": "¿Cuáles son las dos características del superhombre nietzscheano? Seleccione 2 opciones correctas", "o": ["Busca la recompensa en un más allá espiritual como objetivo principal", "Vive fiel a la tierra, no le preocupa el más allá", "Sigue estrictamente las normas morales tradicionales sin cuestionarlas", "No está sometido a ningún precepto moral"], "c": [1, 3], "multi": true, "n": 2}, {"t": "Camila le recomienda a Leo que viva su vida como si fuera una obra de arte. Le cuenta que ella misma hace una estética de su existencia, ya que cree en la posibilidad de vivir la misma vida infinidad de veces. ¿Con cuál idea de Nietzsche asociamos esta reflexión de Camila?", "o": ["La voluntad de poder", "El superhombre", "El Eterno retorno"], "c": 2, "multi": false}, {"t": "Según Nietzsche, ¿cuáles de los siguientes son caracteres de la dimensión apolínea de la realidad o caracteres del dios Apolo?", "o": ["El caos y la irracionalidad", "La desmesura y el desorden", "El orden y la mesura"], "c": 2, "multi": false}, {"t": "En la fábula que emplea Nietzsche sobre el cordero débil e impotente, que observa el vuelo de un águila imperial, ¿qué rasgo del águila refiere a la voluntad de poder?", "o": ["Es fuerte por afirmativa", "Se somete a leyes externas", "Depende de la aprobación de los demás"], "c": 0, "multi": false}, {"t": "Durante el reportaje este economista intercaló su reflexión con una conclusión filosófica al decir que lo que se entiende por verdadero es solo un supuesto. Le consultaron si reconocía la influencia de algún pensador y dijo que sí, que era un gran lector de Nietzsche. ¿En qué otra idea se podrá advertir esta influencia?", "o": ["En que afirmó que las palabras tienen un valor absoluto y reflejan fielmente la realidad", "En que defendió que la ciencia descubre verdades universales sin interpretación", "En que también afirmó que el lenguaje que nombra las cosas no refleja verdad alguna, sino que es solo una construcción de metáforas"], "c": 2, "multi": false}, {"t": "Nicolás te dice que el universo no es un todo ordenado y estable, sino un caos dinámico dominado por una fuerza irracional que es la realidad. Al oírlo te resuenan las palabras de Nietzsche. ¿Por qué?", "o": ["Porque para Nietzsche el universo es visto como un gigantesco escenario en el que todas las cosas atravesadas por esa voluntad insaciable luchan por existir y preservar su ser", "Porque Nietzsche creía que el universo estaba gobernado por leyes matemáticas fijas", "Porque Nietzsche consideraba que la realidad era completamente predecible y estable"], "c": 0, "multi": false}, {"t": "¿Por qué Nietzsche dice que la tradición platónica-cristiana preconiza una moral de esclavos?", "o": ["Porque enfatiza la afirmación de la vida y la fuerza individual", "Porque la vida terrenal queda supeditada al Más Allá", "Porque promueve la autotrascendencia y la creatividad personal"], "c": 1, "multi": false}, {"t": "¿Qué sentido tiene la distinción entre apolíneo y dionisiaco en la filosofía nietzscheana?", "o": ["Señalar que la vida occidental está basada únicamente en el placer", "Probar que la moral es innata e inmutable", "Demostrar que Occidente ha ocultado el trasfondo trágico del mundo"], "c": 2, "multi": false}, {"t": "Manuel sostiene que para salir de las crisis sociales y políticas que se suscitan en el mundo actual, hay que atreverse a salir del rebaño y convertirse en un superhombre, capaz de transmutar todos los valores impuestos por la cultura occidental. ¿A qué filósofo estaría leyendo?", "o": ["Platón", "Nietzsche", "Aristóteles"], "c": 1, "multi": false}, {"t": "¿Qué tipo de lógica impera en la moral de los débiles para Nietzsche?", "o": ["La lógica de la afirmación de la vida", "La lógica del resentimiento", "La lógica del superhombre"], "c": 1, "multi": false}, {"t": "¿Qué es la verdad para Nietzsche?", "o": ["Es una ilusión", "Un conjunto de hechos empíricos verificables", "Una realidad objetiva accesible a la razón pura", "Una hueste en movimiento de metáforas, metonimias, antropomorfismos"], "c": 3, "multi": false}, {"t": "Se trata de un grupo de personas que se sienten amenazadas por los guerreros. En realidad, envidian su fortaleza y desearían ser como ellos. Por ello, juzgan a los guerreros como malvados y de rebote creen que ellos mismos son los buenos. ¿Cómo llama Nietzsche a esto?", "o": ["La moral de los esclavos", "La moral universal y equitativa", "La moral de los héroes"], "c": 0, "multi": false}]}, {"title": "Heidegger · Dasein, ser y tiempo, existencia auténtica", "questions": [{"t": "¿Qué es el hombre, según Heidegger?", "o": ["Un ser en el mundo", "Un ente aislado del entorno", "Un simple objeto biológico"], "c": 0, "multi": false}, {"t": "Nicolás tiene que hacer un análisis sobre las redes sociales. En este análisis le viene a la mente una temática central en Heidegger: hay un modo de vida en el que las personas hacen lo que hace el resto, ven lo que ven los otros y hablan de lo que hablan los demás; este sumergir en lo cotidiano le permite diluir su ser en el anonimato de la masa. Nicolás trata de conceptualizar este punto, pero necesita recordar una expresión clave. ¿Cuál es?", "o": ["La de existencia inauténtica", "La de existencia plena", "La de libertad absoluta"], "c": 0, "multi": false}, {"t": "Andrés, haciendo un análisis filosófico de la existencia humana, sostiene, como Heidegger, que el problema consiste en que el Ser ha sido velado u ocultado, a través de la historia. ¿Cómo se ha producido este ocultamiento, en la historia de la filosofía? Seleccione las 4 (cuatro) opciones correctas", "o": ["En la cosa pensante de Descartes", "En el imperativo categórico de Kant", "En las ideas de Platón", "En la ética del superhombre de Nietzsche", "En la sustancia de Aristóteles"], "c": [0, 1, 2, 4], "multi": true, "n": 4}, {"t": "Heidegger sostiene que, ante la posibilidad de la muerte, sólo caben dos posibilidades: aceptarla o distraerse, para tratar de eludirla. En el primer caso, la persona realiza su vida llevando una existencia auténtica; en el segundo caso, el Dasein malogrará su vida y realizará una existencia inauténtica.", "o": ["Falso", "Verdadero"], "c": 1, "multi": false}, {"t": "¿Cuáles de las siguientes nociones filosóficas remiten a Heidegger? Seleccione las 4 (cuatro) opciones correctas", "o": ["Existencia Auténtica", "Olvido del ser", "Ser para la muerte", "Ser ahí", "Principio de placer"], "c": [0, 1, 2, 3], "multi": true, "n": 4}, {"t": "Para Heidegger la existencia resulta inseparable del mundo; el mundo no aparece por una parte y el ser ahí por la otra. Existir es siempre ser en el mundo.", "o": ["Verdadero", "Falso"], "c": 0, "multi": false}, {"t": "¿Qué exige asumir la existencia auténtica para Heidegger? Seleccione las 4 (cuatro) opciones correctas", "o": ["Asumir el ser enfrente a la nada", "Asumir la finitud, la temporalidad del existir y la muerte como posibilidad más propia", "Rechazar toda conciencia de la muerte", "La efectividad de la existencia", "El estado de yecto"], "c": [0, 1, 3, 4], "multi": true, "n": 4}, {"t": "Para Heidegger, la facticidad remite a estar ya siempre en una situación, y la existencialidad expresa el poder ser que se abre siempre ante mí bajo determinadas posibilidades que me obligan a elegir.", "o": ["Falso", "Verdadero"], "c": 1, "multi": false}, {"t": "Martina se dedica al proteccionismo animal, porque sostiene que tanto los animales como nosotros somos parte del mundo, tanto como el mundo es parte de nosotros. ¿A las ideas de qué pensador nos remite la reflexión de Martina?", "o": ["A Heidegger", "A Platón", "A Kant"], "c": 0, "multi": false}, {"t": "¿Cuál de los siguientes títulos refiere a la obra cumbre de Heidegger?", "o": ["La fenomenología del espíritu", "Crítica de la razón pura", "Ser y tiempo"], "c": 2, "multi": false}, {"t": "¿Cuál es la definición de Dasein?", "o": ["El hombre como objeto externo, separado del mundo y de sus circunstancias", "El hombre como simple ente biológico sin conciencia de sí mismo", "El hombre como ser - Ahí"], "c": 2, "multi": false}, {"t": "El ser humano, para Heidegger, se caracteriza por una serie de existenciarios, rasgos ontológicos de la existencia. ¿Cuáles son ellos? Seleccione las 4 (cuatro) opciones correctas", "o": ["Apertura", "Razón", "Estar en el mundo", "Comprensión", "Ser en común"], "c": [0, 2, 3, 4], "multi": true, "n": 4}, {"t": "En qué plano se encuentra el Ser para Heidegger", "o": ["Ontológico", "Epistemológico", "Estético"], "c": 0, "multi": false}, {"t": "¿Cuál fue la preocupación fundamental de Martin Heidegger?", "o": ["Que la filosofía anterior a su tiempo se ha olvidado del ser", "Que el conocimiento científico es la única vía para comprender la realidad", "Que la filosofía debería centrarse exclusivamente en la ética práctica"], "c": 0, "multi": false}, {"t": "¿Qué entiende Hegel por filosofía?", "o": ["La ciencia de lo absoluto", "La mera observación de fenómenos sin análisis", "El estudio exclusivo de la ética"], "c": 0, "multi": false}, {"t": "¿Qué implica el eterno retorno?", "o": ["La materia es finita, pero las combinaciones en el tiempo son infinitas", "El tiempo es lineal e ilimitado sin repetición", "La materia se desvanece y nunca vuelve a existir"], "c": 0, "multi": false}, {"t": "Andrea opina que hay justicia en una sociedad, si esta genera una justa igualdad de oportunidades, y apuesta por un igual acceso a la educación, para que cada cual pueda desarrollar su propio proyecto de vida. ¿Con qué podemos vincular la opinión de Andrea?", "o": ["La teoría del superhombre de Nietzsche", "El principio de placer", "El principio de diferencia de Rawls"], "c": 2, "multi": false}, {"t": "Hablando de la Revolución Digital, el entrevistado argumentó: \"En una época en que la ciencia y la técnica están desplazando el pensar y administran la representación del mundo, se nos substrae o elude lo que hay que pensar\". Le preguntaron qué podía la humanidad hacer frente a esta situación, y comentó: \"concebir el fundamento del ente en total, y repensar para ello conceptos como fundamento, inicio, ser, diferencia\". ¿Con qué filosofía podrían asociarse estas palabras?", "o": ["Con la de Heidegger", "Con la de Kant", "Con la de Marx"], "c": 0, "multi": false}, {"t": "Imaginemos que estamos esperando para comprar entradas en el cine y vemos cómo alguien se cuela. Este hecho nos indigna y llamamos la atención al infractor. ¿A qué se debe nuestra indignación? Frente a estas explicaciones, ¿qué diría Nietzsche?", "o": ["Que nuestra indignación no tiene relación con nosotros y surge por influencia externa", "Que nuestra indignación se debe únicamente al respeto absoluto a las leyes escritas", "Que quizá nuestra indignación no se origina en creencias racionales o éticas de naturaleza desinteresada, sino que se trata de una forma de justificar inconscientemente nuestro autointerés"], "c": 2, "multi": false}, {"t": "Popper empieza una revisión crítica del problema de la inducción valiéndose de la crítica, ¿de qué filósofo?", "o": ["De Hume", "Hobbes", "Kant"], "c": 0, "multi": false}]}, {"title": "Sartre, Husserl · Existencialismo y Fenomenología", "questions": [{"t": "¿Por qué en la filosofía de Sartre el hombre está condenado a ser libre?", "o": ["Porque puede elegir libremente y resultar responsable de sus elecciones", "Porque la libertad es únicamente una ilusión sin consecuencias", "Porque está predeterminado por la naturaleza y no puede decidir"], "c": 0, "multi": false}, {"t": "Que nos quiere decir la filosofía existencialista de Sartre, cuando sostiene que la existencia precede a la esencia", "o": ["Que el hombre empieza a existir, se encuentra, surge en el mundo y, después, se define", "Que la esencia del hombre existe antes de que nazca", "Que la existencia del hombre está completamente predeterminada"], "c": 0, "multi": false}, {"t": "Enrique le reprocha a su amigo Pedro que le haya robado dinero. Pedro se justifica, diciendo que no tenía elección y se dejó llevar por la urgencia. Enrique le responde que eso no es cierto, porque siempre se puede elegir. ¿Con qué filósofo podemos relacionar el pensamiento de Enrique?", "o": ["Con el positivismo lógico", "Con la moral de esclavos de Nietzsche", "Con el existencialismo de Sartre"], "c": 2, "multi": false}, {"t": "La situación de la persona al elegir se da, para Sartre, entre dos cuestiones clave. ¿Cuáles son?", "o": ["La necesidad y la tradición", "La contingencia y la libertad absoluta", "La moralidad y el destino"], "c": 1, "multi": false}, {"t": "¿Por qué en Sartre la existencia precede a la esencia?", "o": ["Porque la esencia determina previamente todas las acciones del individuo", "Porque sólo la existencia puede proyectarse fácticamente en el mundo por la propia decisión de la persona", "Porque la existencia es secundaria y depende de la esencia"], "c": 1, "multi": false}, {"t": "Para Sartre la presencia del otro resulta ser una amenaza para nuestra supervivencia. Porque Seleccione las 3 (tres) opciones correctas:", "o": ["Nos convierte en objetos", "Nos limita", "Nos protege siempre de cualquier peligro externo", "Nos define", "Nos hace completamente libres sin restricciones"], "c": [0, 1, 3], "multi": true, "n": 3}, {"t": "¿De qué forma entiende la libertad Sartre?", "o": ["La libertad se limita a la ausencia de restricciones externas, sin responsabilidad", "Es un ejercicio de realización permanente y cambiante, una creación imparable", "La libertad consiste en seguir estrictamente las normas sociales", "El para sí del hombre es pura libertad"], "c": 1, "multi": false}, {"t": "Amalia dice que el absurdo de la existencia le causa náusea, porque no le queda más que asumir que venimos de la nada y que hacia la nada vamos. ¿Qué pensador se refirió a la náusea, como sentimiento ante el absurdo de la existencia?", "o": ["Sartre", "Heidegger", "Nietzsche"], "c": 0, "multi": false}, {"t": "Ana, profesora de Filosofía, les enseña a sus alumnos que el método de la fenomenología pretende que, a través de la reflexión, podamos descubrir aquello invariable, que está presente en las vivencias del ser humano (esencias). ¿Cómo logramos lo propuesto por la profesora Ana?", "o": ["Siguiendo la causalidad científica sin considerar la experiencia", "Poniendo entre paréntesis la realidad", "Observando únicamente los hechos sin reflexión"], "c": 1, "multi": false}, {"t": "¿Cómo se llama la fenomenología o la experiencia en la que se hace presente la esencia de las cosas?", "o": ["Análisis lógico-sintético", "Intuición empírica", "Reducción eidética"], "c": 2, "multi": false}, {"t": "¿Qué es la conciencia intencional para Husserl?", "o": ["Conciencia de algo", "Un estado puramente físico sin significado", "Conciencia vacía, sin relación con objetos"], "c": 0, "multi": false}, {"t": "¿Cuál es la tarea de la fenomenología, para Husserl?", "o": ["Reducir la experiencia humana a un conjunto de hechos objetivos sin considerar su significado", "Explicar el mundo únicamente mediante leyes causales y científicas", "Describir el sentido del mundo"], "c": 2, "multi": false}, {"t": "Diego y sus compañeros de Filosofía están estudiando a Husserl. Diego, desde una perspectiva hermenéutica, les comenta a sus compañeros que la interpretación de los textos, según Gadamer, resulta infinita. ¿A qué se refiere lo que indica Gadamer?", "o": ["A que la interpretación queda al criterio de cada persona", "A que existe una única interpretación correcta", "A que los textos no necesitan interpretación"], "c": 0, "multi": false}, {"t": "Desde la concepción de Thomas Kuhn, un nuevo paradigma producto de una revolución científica puede comprenderse desde el paradigma anterior.", "o": ["Falso", "Verdadero"], "c": 0, "multi": false}, {"t": "¿Cuándo es más falsable una teoría según Popper?", "o": ["Cuanto más prohíba", "Cuanto más ampliamente aceptada por consenso", "Cuanto más se base únicamente en la intuición"], "c": 0, "multi": false}, {"t": "Consideremos enunciados observables del tipo el oro se dilata con el calor, el plomo se dilata con el calor; tomando en cuenta estos enunciados singulares, se formulan otros generales del tipo todos los metales se dilatan con el calor. ¿Qué tipo de estructura inferencial se emplea?", "o": ["Deductiva, de lo general a lo particular", "Abductiva, de la hipótesis a la explicación", "Inductiva, de lo particular a lo general"], "c": 2, "multi": false}, {"t": "Supongamos que se diseña un experimento y uno de los potenciales resultados de ese experimento entraña una contradicción puesta en juego que no pasa la prueba. Siguiendo a Popper, estaríamos en presencia de", "o": ["Un hecho verificable que confirma la teoría sin contradicción", "Una afirmación metafísica que no puede ser probada ni refutada", "Un posible caso falsador"], "c": 2, "multi": false}, {"t": "Según Popper, ¿con qué comienza el conocimiento científico?", "o": ["Con verdades absolutas", "Con observaciones sin hipótesis", "Con conjeturas"], "c": 2, "multi": false}, {"t": "La polémica ya llevaba muchas horas. Uno de los interlocutores dice: \"No tiene sentido preocuparse por la verdad o falsedad de los juicios que emitimos, ya que no existen realidades en sí mismas. Lo único que existe son interpretaciones de la realidad\". ¿Con qué concepto en Nietzsche podemos relacionar esta expresión?", "o": ["Al de perspectivismo", "Determinismo", "Idealismo absoluto"], "c": 0, "multi": false}, {"t": "Walter dice que debemos recordar a Hobbes y su concepción de la naturaleza del hombre por lo que se precisa establecer un contrato social con el fin de sacar al hombre del estado de naturaleza. Lautaro le responde que la teoría del contrato social ha sido empleada por otros pensadores en donde el estado de naturaleza se corresponde, hipotéticamente, con la posición original de igualdad. ¿A quién hace referencia?", "o": ["A Rawls", "A Descartes", "A Platón"], "c": 0, "multi": false}]}, {"title": "Marx · Lucha de clases, alienación, materialismo histórico", "questions": [{"t": "Para Karl Marx, el proletariado representa la afirmación del capitalismo.", "o": ["Verdadero", "Falso"], "c": 1, "multi": false}, {"t": "Para Karl Marx, ¿por qué está determinada la estructura social?", "o": ["Por las preferencias individuales de cada ciudadano", "Por las leyes morales universales", "Por las relaciones de producción"], "c": 2, "multi": false}, {"t": "Rafael está participando de una asamblea de trabajadores, en la fábrica en la que trabaja. Cuando llega su turno de hablar, le dice a sus compañeros que tienen que adquirir conciencia de clase y darse cuenta de que están siendo explotados, y que las ideas que sostienen son las impuestas por los propietarios, que pertenecen a la clase dominante. ¿A qué filósofo pertenecen las ideas de Rafael?", "o": ["A Marx", "A Hobbes", "A Kant"], "c": 0, "multi": false}, {"t": "Sandra está convencida, al igual que Marx, de que la sociedad debe llegar a un sistema de producción en el que queden abolidas la propiedad privada y todas las formas de dominación. ¿Cómo se llama el sistema que propone Sandra?", "o": ["Comunismo", "Capitalismo", "Feudalismo"], "c": 0, "multi": false}, {"t": "El pensamiento de Karl Marx estuvo marcado en aspectos esenciales, ¿por qué filósofo?", "o": ["Kant", "Platón", "Hegel"], "c": 2, "multi": false}, {"t": "Andrés está cansado de su trabajo de más de 10 horas diarias. Dice que se siente como una mercancía. Usando términos marxistas, podemos decir que Andrés sufre", "o": ["Alienación de sí mismo", "La afirmación del superhombre interior", "Autotrascendencia sin límites"], "c": 0, "multi": false}, {"t": "Se decide llevar a cabo un congreso sobre el fenómeno de la urbanización desde el pensamiento de Marx. ¿Qué características tendría la urbanización desde un análisis sobre la urbanización de la riqueza?", "o": ["Que los espacios urbanos están destinados a convertirse en fuente de beneficio para unos pocos", "Que la urbanización no tiene relación alguna con la riqueza o el capital", "Que los espacios urbanos benefician equitativamente a toda la población"], "c": 0, "multi": false}, {"t": "Las principales obras de Marx constituyen, en gran medida, un análisis ¿de qué?", "o": ["De la psicología individual", "Del sistema capitalista", "De la filosofía oriental"], "c": 1, "multi": false}, {"t": "Juan ha estado estudiando filosofía política durante muchos años. Al analizar la realidad social, coincide con la concepción de Marx. Para él, ¿de qué depende la realidad social?", "o": ["De presupuestos materiales determinados por las relaciones de producción", "Exclusivamente de la voluntad individual de los líderes", "De las ideas abstractas y universales que gobiernan la moral"], "c": 0, "multi": false}, {"t": "Un reciente análisis de la revista británica The Economist muestra que mientras que en las últimas dos décadas el sueldo de los trabajadores en países como Estados Unidos se ha estancado, el salario de los máximos ejecutivos ha aumentado significativamente. ¿Cuál de los siguientes enunciados correspondería al pensamiento de Marx?", "o": ["Que la riqueza se distribuye automáticamente de manera equitativa entre todos los miembros de la sociedad", "Que los salarios de los trabajadores siempre aumentan sin importar la concentración de capital", "El capital tiende a concentrarse y centralizarse en unos pocos y como contrapartida conduce al desempleo y a una depreciación de los salarios de los trabajadores"], "c": 2, "multi": false}, {"t": "¿Es posible sostener que el marxismo ha sido crítico con el eurocentrismo, pero mantuvo sus postulados eurocéntricos?", "o": ["No, porque el marxismo siempre fue completamente ajeno a cualquier perspectiva europea", "Sí, porque rechazó por completo toda influencia europea", "Si, porque toda su teoría se basa en preceptos y análisis eurocéntricos"], "c": 2, "multi": false}, {"t": "Renata planteó que hay varios temas de debate sobre política y economía presentes en la obra de Marx que están vigentes más de un siglo después. ¿Cuál selecciona para su análisis?", "o": ["La promoción del feudalismo rural", "La destrucción de mercados locales", "La defensa de la monarquía absoluta"], "c": 1, "multi": false}, {"t": "¿Cuál es el objetivo de la filosofía de Marx?", "o": ["Mantener el statu quo y justificar las estructuras sociales existentes", "Estudiar la sociedad únicamente para describirla sin intervenir en ella", "Transformar la sociedad"], "c": 2, "multi": false}, {"t": "Según la teoría marxista ¿cómo avanzan las sociedades?", "o": ["Gracias al consenso absoluto entre ricos y pobres", "Gracias al motor de la lucha de clases", "Gracias al desarrollo individual de talentos sin conflictos sociales"], "c": 1, "multi": false}, {"t": "Según Marx, ¿cuáles son las clases sociales que están en contradicción dialéctica?", "o": ["Aristócratas y campesinos", "Comerciantes y filósofos", "Burgueses y proletarios"], "c": 2, "multi": false}, {"t": "Pedro trabaja 10 horas diarias en un taller de costura, en condiciones indignas y por un salario menor al mínimo vital. Por tal razón, se siente alienado. En términos marxistas, ¿qué es Pedro?", "o": ["Un burgués", "Un proletario", "Un aristócrata"], "c": 1, "multi": false}, {"t": "Según Marx, ¿dónde se incluyen las fuerzas productivas?", "o": ["En la superestructura", "En la estructura", "En la ideología"], "c": 1, "multi": false}, {"t": "Según Marx, ¿cuál es el motor de la historia?", "o": ["La búsqueda individual de felicidad", "La lucha de clases", "La voluntad divina"], "c": 1, "multi": false}, {"t": "Un grupo de compañeros de trabajo está organizando una fiesta para despedir el año. El jefe les dice que, en la fiesta, va a estar garantizada la mayor libertad posible e igual para todos. Les comenta que siempre ha deseado que este principio se aplique en toda la sociedad. ¿A qué pensador refiere el principio mencionado por el jefe?", "o": ["Karl Marx", "Thomas Hobbes", "John Rawls"], "c": 2, "multi": false}, {"t": "¿Cómo se podría definir el propósito de la filosofía de Ortega?", "o": ["Reducir la filosofía a un ejercicio puramente abstracto y desvinculado de la vida cotidiana", "El sujeto no está encapsulado en sí mismo, sino que está abierto a las cosas y a las circunstancias que le toca vivir", "Devolver la filosofía al terreno de la vida, a la cotidianidad", "Considerar al sujeto como un ente completamente aislado de su entorno y de la realidad que lo rodea"], "c": 2, "multi": false}]}, {"title": "Hegel y Ortega · Idealismo dialéctico y razón vital", "questions": [{"t": "Samanta está estudiando un texto recomendado por su profesor de filosofía, que explica que el espíritu progresa porque se transforma en lo otro de sí. ¿De qué obra se trata?", "o": ["La fenomenología del espíritu", "La Ética de lo absoluto sin cambio", "La Metafísica de lo inmutable"], "c": 0, "multi": false}, {"t": "La filosofía hegeliana contempla tres dimensiones: el espíritu subjetivo (la mente humana), el espíritu objetivo (la naturaleza) y el espíritu absoluto. Estas tres condiciones están ligadas por un movimiento interno de la realidad. ¿Con qué nombre se conoce?", "o": ["Se conoce con el nombre de dialéctica", "Metafísica", "Empirismo"], "c": 0, "multi": false}, {"t": "Ana, para comprender la frase La hermana Luisa está en Canadá, averigua todo respecto de Luisa y quién es su hermana, quiénes son sus padres y demás antepasados; entiende que la verdad implica todo. En una primera aproximación, ¿a qué idea de Hegel se está refiriendo?", "o": ["A la que sostiene que todas las dimensiones de la realidad están en unidad", "A la que sostiene que la realidad es únicamente causal", "A la que afirma que la verdad es solo una percepción individual"], "c": 0, "multi": false}, {"t": "¿Dentro de qué corriente se encuadra la filosofía de Hegel?", "o": ["Idealismo absoluto", "Empirismo", "Materialismo histórico"], "c": 0, "multi": false}, {"t": "Mario es una persona muy religiosa y coincide con Hegel, en que Dios se representa en el tercer momento del espíritu absoluto. ¿Cómo se despliega el tercer momento absoluto, para Hegel?", "o": ["Como ritual, costumbre y tradición", "Como arte, religión y filosofía", "Como mito, superstición y leyenda"], "c": 1, "multi": false}, {"t": "Para Hegel, la naturaleza dialéctica de la idea constituye el impulso hacia su actividad. ¿Qué significa esto?", "o": ["La idea absoluta se mantiene inmutable y sin etapas de desarrollo", "La idea absoluta se desarrolla siguiendo un orden aleatorio sin conexión lógica", "En el proceso de su autodesarrollo dialéctico, la idea absoluta atraviesa tres etapas fundamentales: tesis, antítesis y síntesis"], "c": 2, "multi": false}, {"t": "¿Por qué decimos que el sistema hegeliano es Inmanente?", "o": ["Porque nada hay fuera del sistema", "Porque depende de influencias externas para completarse", "Porque se basa únicamente en la experiencia sensorial"], "c": 0, "multi": false}, {"t": "¿Cuál es el resultado de una contradicción dialéctica?", "o": ["Una síntesis", "Una simple repetición de la tesis inicial", "La anulación completa de ambas posiciones sin producir un nuevo conocimiento"], "c": 0, "multi": false}, {"t": "La filosofía de Hegel parte del idealismo postkantiano.", "o": ["Verdadero", "Falso"], "c": 0, "multi": false}, {"t": "¿Cómo es el esquema dialéctico?", "o": ["Antítesis, síntesis y tesis", "Tesis, antítesis y síntesis", "Síntesis, tesis y negación"], "c": 1, "multi": false}, {"t": "Ortega sostiene que entre los principales atributos de la existencia humana se encuentra la libertad. ¿Qué características presenta? Seleccione las 4 (cuatro) opciones correctas", "o": ["La libertad no es autonomía sin obstáculos: estamos forzados a elegir entre varias posibilidades", "La vida no es dada, sino hecha: nuestra vida se va trazando instante tras instante; la hacemos decidiendo", "La libertad no puede concebirse descuidando el sentido de la vida humana entendida biográficamente: yo soy yo y mi circunstancia", "La capacidad de decidir está condicionada: el mundo concreto, el aquí y ahora ejerce su influencia", "La libertad es absoluta e independiente de cualquier circunstancia externa"], "c": [0, 1, 2, 3], "multi": true, "n": 4}, {"t": "¿Qué intenta superar Ortega y Gasset con la noción de razón vital? Selecciona las 2 (dos) opciones correctas", "o": ["Al empirismo", "Al idealismo", "Al existencialismo", "Al realismo"], "c": [1, 3], "multi": true, "n": 2}, {"t": "Desde distintos puntos de vista, dos hombres miran el mismo paisaje. Sin embargo, no ven lo mismo. ¿A qué clave de la filosofía de Ortega refiere esta descripción?", "o": ["Al perspectivismo: la perspectiva es uno de los componentes de la realidad", "Al existencialismo: la existencia precede a la esencia", "Al empirismo: el conocimiento se basa únicamente en la experiencia sensorial"], "c": 0, "multi": false}, {"t": "Para Ortega y Gasset, ¿en qué consiste vivir según la razón vital? Selecciona las 4 (cuatro) opciones correctas", "o": ["Evitar toda responsabilidad y dejar que otros elijan por uno", "Decidir continuamente", "Tener un propósito", "Ser libre", "Encontrarse en el mundo"], "c": [1, 2, 3, 4], "multi": true, "n": 4}, {"t": "Yo soy yo y mi circunstancia y si no la salvo a ella no me salvo yo, resume el pensamiento de Ortega al decir que no hay sujeto sin objeto y viceversa. ¿Por qué es importante para Ortega la comprensión de la circunstancialidad?", "o": ["Porque pensar circunstancial significa ignorar el presente y centrarse solo en ideas eternas", "Porque la circunstancia es irrelevante y no influye en la vida del sujeto", "Porque el pensar circunstancial es un pensar vital, piensa la vida que está aquí y ahora, y no la que quiere mostrarse eterna e inmutable, propia de la razón pura"], "c": 2, "multi": false}, {"t": "Miguel le reprocha a su amiga Malena que se comporta de una manera cuando está con él, y de otra cuando está con sus compañeros de trabajo. Dice que parece ser otra persona de acuerdo a sus circunstancias. ¿Con qué filósofo coincide Malena?", "o": ["Hobbes", "Platón", "Ortega y Gasset"], "c": 2, "multi": false}, {"t": "Fernando vive en una época determinada, le toca atravesar una situación personal por primera vez que lo desconcierta, vive en un país en condición de inmigrante, temeroso frente a los cambios laborales que se avecinan. ¿Qué diría, en general, la filosofía de Ortega?", "o": ["Que el yo de Fernando es independiente del contexto y del mundo que lo rodea", "Que el yo propio de Fernando se hace en esa relación con la otredad de las cosas, es decir, en relación con el mundo circundante", "Que Fernando no tiene libertad para proyectarse en su vida"], "c": 1, "multi": false}, {"t": "¿Por qué el pensamiento de Ortega aparece como la consumación de todo un pensamiento que da pasó a la acción?", "o": ["Porque el pensamiento debe permanecer aislado de la vida cotidiana", "Porque el individuo que vive inmerso en las circunstancias participa de ellas de forma activa y consiente", "Porque la acción carece de relación con la reflexión filosófica"], "c": 1, "multi": false}, {"t": "Cómo es el vitalismo que defiende Ortega y Gasset.", "o": ["Pensante", "Ideal", "Racional"], "c": 2, "multi": false}, {"t": "¿Quién es el padre de la doctrina filosófica conocida como perspectivismo?", "o": ["Nietzsche", "Ortega y Gasset", "Heidegger"], "c": 1, "multi": false}]}, {"title": "Foucault · Cuidado de sí, inquietud, gubernamentalidad", "questions": [{"t": "¿Cuáles de las siguientes afirmaciones se corresponden con la noción foucaultiana de inquietud de si? Selecciona las 4 (cuatro) opciones correctas", "o": ["Práctica", "Actitud", "Transmutación", "Transformación", "Reflexión"], "c": [0, 1, 3, 4], "multi": true, "n": 4}, {"t": "Mariana está acompañando a una amiga a transitar un duelo por el fallecimiento de un familiar. Mientras están juntas, hablan sobre sus intimidades de manera profunda. Si nos ubicamos en la perspectiva de Michel Foucault, ¿qué práctica de cuidado de si está realizando Mariana?", "o": ["Disciplina física", "Observación científica", "Acompañamiento existencial"], "c": 2, "multi": false}, {"t": "Cintia es una joven que vive en una pequeña localidad del sur del país y está interesada en participar en política. Le dice, siguiendo a Foucault, que para lograr ejercer poder sobre los otros, primero, tiene que ocuparse de ella misma. ¿En qué personaje de los diálogos de Platón se inspira Foucault?", "o": ["Sócrates", "Aristóteles", "Platón"], "c": 0, "multi": false}, {"t": "El Alcibíades (diálogo que la Antigüedad no duda en atribuir a Platón) es tomado por Foucault como el punto de partida de la tradición de la inquietud de si, del cuidado de sí mismo. ¿Con qué se relaciona la cuestión del cuidado de sí mismo?", "o": ["Con la economía y la tecnología", "Con la ciencia empírica y la matemática", "Con la política, la pedagogía y el conocimiento de sí"], "c": 2, "multi": false}, {"t": "Paula está meditando y realizando exámenes de conciencia, como prácticas sobre sí misma, para llegar al acceso a la verdad en sentido filosófico. ¿Cómo llama Michel Foucault a esas prácticas?", "o": ["Espiritualidad", "Actividad social sin reflexión personal", "Simple rutina diaria"], "c": 0, "multi": false}, {"t": "Completa el enunciado seleccionando la opción correcta. Foucault sostiene que las artes de gobernar incluyen el estudio del gobierno de si, la ética, el gobierno de los otros, las formas políticas de la gobernabilidad. Todos se vinculan en un campo estratégico", "o": ["De moral inmutable", "De relaciones de poder", "De conocimiento absoluto"], "c": 1, "multi": false}, {"t": "Para Foucault, la voluntad de saber logra su fuerza mediante. Selecciona las 4 (cuatro) opciones correctas", "o": ["La neutralidad valorativa", "El estadio material", "La pretensión de verdad", "La objetividad", "La universalidad"], "c": [0, 2, 3, 4], "multi": true, "n": 4}, {"t": "¿Cuáles de las siguientes practicas del cuidado del sí explica Foucault en La hermenéutica del sujeto? Seleccione las 4 (cuatro) opciones correctas", "o": ["Examen de conciencia", "Acumulación de poder", "Silencio", "Lectura", "Meditación"], "c": [0, 2, 3, 4], "multi": true, "n": 4}, {"t": "Foucault sostiene que la noción de inquietud de sí ha sido retomada por la moral moderna no cristiana. ¿De qué manera se ha producido este retorno?", "o": ["En forma de un retiro absoluto del mundo", "En forma de una obligación para con los otros", "Como rechazo de toda responsabilidad moral"], "c": 1, "multi": false}, {"t": "Michel Foucault se interesó por la cuestión del sujeto y la importancia de ocuparse de sí mismo, como una tarea ética. ¿Cómo llama Foucault al ocultamiento del precepto de inquietud de si en cierto momento de la historia?", "o": ["Cartesiano", "Aristotélico", "Kantiano"], "c": 0, "multi": false}, {"t": "En su conferencia, usted sostuvo que quizá hoy hayamos llegado a un punto en el cual nuestra domesticación es tan grande que no podemos apreciar su marcha. Si no podemos distinguir ese poder, ¿por qué retomar los estudios de Foucault?", "o": ["Porque el poder es siempre individual y nunca afecta a grupos", "Porque, según Foucault, el poder pastoral se dirige a personas, pero no se trata de cualquier tipo de personas, sino de aquellas que se constituyen a la manera de un rebaño", "Porque Foucault sostiene que el poder no existe"], "c": 1, "multi": false}, {"t": "Michel Foucault sostiene que la filosofía occidental ha privilegiado al conocimiento de uno mismo, en vez de la preocupación por uno mismo. ¿Qué ve Foucault en la inquietud de si?", "o": ["Una cuestión egoísta", "Una práctica ética de relación consigo mismo", "Una obligación religiosa"], "c": 1, "multi": false}, {"t": "Según Michel Foucault, ¿cuál fue el primer momento en el que la filosofía comenzó a ocuparse de la inquietud del sí?", "o": ["El momento medieval escolástico", "El momento socrático platónico", "El momento cartesiano"], "c": 1, "multi": false}, {"t": "Marcos medita todas las mañanas, al despertarse, y a la noche realiza un examen de conciencia. Además, está tratando de escuchar mejor a las personas que lo rodean. Realiza estas prácticas desde que leyó y estudió La hermenéutica del sujeto, de Michel Foucault, porque le ayudan a instaurar una relación consigo mismo y con los otros. Esta es la manera de constituirse, ¿como qué?", "o": ["Como ser meramente social", "Como sujeto ético", "Como objeto pasivo"], "c": 1, "multi": false}, {"t": "¿En qué filosofía de la Antigüedad podemos encontrar la noción de cuidado de si como una terapia?", "o": ["Epicuro", "Aristóteles", "Platón"], "c": 0, "multi": false}, {"t": "¿Cuáles de las siguientes opciones son nociones de Michel Foucault? Seleccione las 2 (dos) opciones correctas", "o": ["Principio de placer", "Gubernamentalidad", "Dasein", "Inquietud de si"], "c": [1, 3], "multi": true, "n": 2}, {"t": "Según Honneth, ¿qué esfera se encuentra dañada cuando no se reconoce la capacidad moral de un sujeto?", "o": ["Esfera del derecho", "Esfera de la familia", "Esfera de la solidaridad"], "c": 0, "multi": false}, {"t": "Lucía afirma que los objetos pesados, como una piedra, caen directamente hacia abajo, al ser arrojados cerca de la superficie de la tierra, siempre y cuando no haya algo que lo impida. ¿Cómo es la afirmación de Lucía?", "o": ["Inmutable y absoluta", "Falsable y verdadera provisionalmente", "Solo una opinión sin posibilidad de prueba"], "c": 1, "multi": false}, {"t": "¿Cuáles de los siguientes pensadores han realizado críticas a sistemas filosóficos anteriores a su época? Selecciona las 4 (cuatro) opciones correctas", "o": ["Husserl", "Heidegger", "Nietzsche", "Tales de Mileto", "Ortega y Gasset"], "c": [0, 1, 2, 4], "multi": true, "n": 4}, {"t": "Sofía se angustia porque está segura de que, como todos los seres humanos, vamos a morir, pero pese a ello continúa proyectando actividades, estudiando y colaborando en una ONG. ¿En qué corriente filosófica podemos ubicar a Sofía?", "o": ["Empirismo", "Positivismo", "Existencialismo"], "c": 2, "multi": false}]}, {"title": "Popper y Kuhn (I) · Falsacionismo, ciencia normal, paradigmas", "questions": [{"t": "¿Cuáles de las siguientes opciones son características del verificacionismo? Selecciona las 3 (tres) opciones correctas", "o": ["Enunciados universales", "Conocimiento basado únicamente en la intuición", "Método inductivo", "Rechazo total de la experiencia como fuente de conocimiento", "Método deductivo"], "c": [0, 2, 4], "multi": true, "n": 3}, {"t": "¿Con qué podemos relacionar al positivismo lógico? Selecciona la opción correcta", "o": ["La Escuela de Frankfurt", "La fenomenología husserliana", "El círculo de Viena"], "c": 2, "multi": false}, {"t": "El paradigma incluye no solo los supuestos compartidos y las creencias, sino las realizaciones universalmente reconocidas que, durante cierto tiempo, proporcionan modelos de problemas y soluciones a una comunidad científica.", "o": ["Falso", "Verdadero"], "c": 1, "multi": false}, {"t": "Para Popper ¿qué sucede si una teoría es falsada?", "o": ["La teoría se mantiene igual aunque sea refutada", "La teoría se convierte automáticamente en verdad absoluta", "Se sustituye por otra mejor, capaz de explicar aquello que su antecesora no pudo"], "c": 2, "multi": false}, {"t": "Si una comunidad científica X trabaja dentro de un paradigma dominante, invirtiendo la mayor parte de su tiempo en la resolución de enigmas o problemas, ¿en qué etapa se encuentra esa comunidad según Kuhn?", "o": ["En la etapa de revolución científica", "En la etapa de ciencia normal", "En la etapa de preciencia"], "c": 1, "multi": false}, {"t": "¿Qué noción emplea Kuhn para referirse a la ausencia de un lenguaje común entre paradigmas alternativos?", "o": ["Principio de placer", "Inconmensurabilidad", "Eudaimonia"], "c": 1, "multi": false}, {"t": "¿Cuál es para Popper el criterio de demarcación entre la ciencia y seudociencia?", "o": ["La verificación absoluta de todas las hipótesis", "La aceptación generalizada por consenso de la comunidad científica", "La Falsabilidad"], "c": 2, "multi": false}, {"t": "Si tomamos, por ejemplo, el descubrimiento del oxígeno por Lavoisier, el de los rayos X por Roentgen, la teoría darwiniana de la evolución y la teoría de la relatividad, vemos que todos ellos comparten haber resuelto determinadas anomalías. Siguiendo el modelo de Kuhn, ¿a qué hace referencia una anomalía?", "o": ["A hechos que siempre se explican fácilmente dentro del paradigma vigente", "A problemas que se resisten a ser resueltos con las herramientas del paradigma vigente", "A teorías que nunca pueden ser cuestionadas"], "c": 1, "multi": false}, {"t": "¿Cuál es el origen filosófico del verificacionismo?", "o": ["El racionalismo cartesiano", "El empirismo", "El idealismo alemán"], "c": 1, "multi": false}, {"t": "¿En qué período la investigación científica se centra en la articulación, desarrollo y aplicación del paradigma?", "o": ["En la ciencia normal", "En la revolución científica", "En la ciencia presocrática"], "c": 0, "multi": false}, {"t": "Si se trata de un episodio de desarrollo no acumulativo en que un antiguo paradigma es reemplazado, completamente o en parte por otro. ¿A qué momento se hace referencia?", "o": ["A la revolución científica", "A la acumulación gradual de conocimientos", "A la ciencia normal"], "c": 0, "multi": false}, {"t": "Cuando se descubre Urano en el sistema solar, los científicos de la época no comprendían de qué se trataba específicamente, hasta que el paradigma científico reinante en la astronomía lo clasificó como un planeta. Siguiendo la teoría de las revoluciones científicas de Kuhn, hasta que a Urano no se lo reconoció dentro de la clasificación planeta, ¿qué resultaba ser?", "o": ["Un hecho completamente irrelevante", "Un ejemplo de conocimiento absoluto", "Una anomalía dentro del paradigma científico"], "c": 2, "multi": false}, {"t": "Manuel, estudiante de Física, explica a sus compañeros de estudios la importancia de tener un paradigma científico, ya que les sirve de base o formato para resolver los enigmas que se les presenten. ¿Qué pensador ha influido en la concepción de paradigma que tiene Manuel?", "o": ["Thomas Kuhn", "Tomás de Aquino", "Descartes"], "c": 0, "multi": false}, {"t": "Carlos les explica a sus alumnos del colegio secundario que es imposible comprender la teoría heliocéntrica de Copérnico, desde el paradigma o modelo geocéntrico de Ptolomeo. ¿Qué debería responder Carlos?", "o": ["Que los paradigmas, entre sí, son inconmensurables", "Que basta con ajustar pequeñas observaciones dentro del paradigma antiguo", "Que todos los paradigmas son equivalentes y se entienden igual"], "c": 0, "multi": false}, {"t": "Para Kuhn, ante la presencia de una anomalía, la comunidad científica puede actuar de diferentes maneras. Seleccione las 3 (tres) opciones correctas", "o": ["Puede ignorar totalmente cualquier método científico", "Puede con el tiempo situar esa pieza en el marco teórico imperante", "Puede minimizar los efectos que tales eventos anómalos producen", "Puede no ver dicha anomalía por la fuerza de arraigo del mismo paradigma vigente", "Puede eliminar la anomalía mediante la censura y prohibición de la investigación"], "c": [1, 2, 3], "multi": true, "n": 3}, {"t": "Siempre se ha hablado de la posible existencia de un planeta que sería causante de las alteraciones en las órbitas de planetas como Neptuno o Saturno. De acuerdo con el método científico, la aceptación y justificación de esta hipótesis dependerá", "o": ["De la opinión personal de los científicos sin necesidad de pruebas", "De ser sometida a contrastación empírica, esto es, de ponerse a prueba por la experiencia", "De la aceptación inmediata por tradición científica, sin contrastación empírica"], "c": 1, "multi": false}, {"t": "Pensemos en afirmaciones como las de la religión o la astrología, considerando el problema de distinguir entre ciencia y pseudociencia, es decir, buscando un criterio de demarcación. ¿Qué diría la epistemología de Popper en estos casos?", "o": ["Que sus afirmaciones siempre son comprobables y predictivas", "Que no es posible pensar ninguna experiencia u observación que las haga falsas", "Que son ciencias plenamente válidas como la física o la química"], "c": 1, "multi": false}, {"t": "Miriam enseña Genética en la universidad. Ante algunas preguntas de sus alumnos para las que no tiene respuestas, les comenta que no existen soluciones ciertas para todo dentro del modelo. Desde la perspectiva de Kuhn, ¿cómo denominaríamos a estos problemas sin resolver dentro de un paradigma?", "o": ["Paradigmas", "Anomalías", "Hipótesis comprobadas"], "c": 1, "multi": false}, {"t": "Juan es un hombre muy creyente en Dios. Sostiene que la teoría que dice que el universo se origina a partir de una gran explosión (la teoría del Big Bang) es mentira, porque fue Dios quien creó los primeros elementos. Siguiendo a Popper, ¿qué podemos decir de la teoría de Juan?", "o": ["Es completamente demostrable mediante experimentos directos", "Depende únicamente de observaciones empíricas y no de teorías", "No es falsable y, por lo tanto, no es científica"], "c": 2, "multi": false}, {"t": "Camila está estudiando Astronomía. En sus observaciones establece hipótesis, las cuales siempre trata de refutar, a los fines de poder llegar a un conocimiento cierto. ¿Cómo se denomina el método utilizado por Camila?", "o": ["Inducción pura", "Verificacionismo", "Falsacionismo"], "c": 2, "multi": false}]}, {"title": "Popper y Kuhn (II) · Verificacionismo, revoluciones científicas", "questions": [{"t": "¿Cuáles de las siguientes afirmaciones corresponden al método científico, según Popper? Selecciona las 4 (cuatro) opciones correctas", "o": ["Formulación de hipótesis", "Refutación", "Observaciones intrigantes", "Nueva hipótesis", "Aceptación definitiva de la hipótesis sin posibilidad de refutación"], "c": [0, 1, 2, 3], "multi": true, "n": 4}, {"t": "¿Cuál de las siguientes opciones es una de las principales críticas que le realizan a la epistemología de Popper?", "o": ["Falta de consideración al contexto sociopolítico de la práctica científica", "Ignorar por completo la lógica formal en la evaluación de teorías", "Exceso de atención a la interpretación subjetiva de los hechos científicos"], "c": 0, "multi": false}, {"t": "¿Cuáles de las siguientes afirmaciones son correctas sobre la concepción de ciencia normal para Kuhn? Selecciona las 3 (tres) opciones correctas", "o": ["La existencia de un paradigma", "Una forma de resolver problemas", "La ciencia normal rechaza completamente cualquier paradigma existente", "La resolución de problemas científicos se basa únicamente en la creatividad individual", "La legitimidad de una teoría"], "c": [0, 1, 4], "multi": true, "n": 3}, {"t": "¿Qué características presenta la etapa de ciencia normal en el modelo de Kuhn? Seleccione las 4 (cuatro) opciones correctas", "o": ["Rechaza totalmente los paradigmas existentes", "Es una etapa de resolución de enigmas", "No está dirigida a la producción de novedades", "Es esencialmente conservadora, de estabilidad y crecimiento acumulativo", "Funciona la mayor parte del tiempo en las comunidades científicas"], "c": [1, 2, 3, 4], "multi": true, "n": 4}, {"t": "Pensemos en el desarrollo de la ciencia, considerando la obra de Copérnico. Si afirmamos la existencia de una revolución copernicana en términos de Kuhn, ¿a qué idea central refiere el concepto de revolución?", "o": ["Al mantenimiento del paradigma geocéntrico sin cambios", "Al pasaje o transición de un paradigma geocéntrico a otro heliocéntrico", "A la simple observación de los planetas sin modificar teorías existentes"], "c": 1, "multi": false}, {"t": "En qué consiste el método inductivo", "o": ["Formular hipótesis que no requieren verificación", "Aplicar leyes generales sin observar los casos particulares", "Derivar de la verdad de la circunstancia particular, la verdad de la conclusión"], "c": 2, "multi": false}, {"t": "¿Cuáles de las siguientes afirmaciones son correctas sobre el desarrollo de la ciencia, según Thomas Kuhn? Selecciona las 3 (tres) opciones correctas", "o": ["Preciencia", "Ciencia avanzada", "Caos", "Ciencia normal", "Crisis"], "c": [0, 3, 4], "multi": true, "n": 3}, {"t": "¿Cuál de las siguientes afirmaciones pertenece a una tesis de Karl Popper?", "o": ["Las hipótesis pueden ser refutadas", "El conocimiento científico se basa únicamente en la acumulación de hechos observables, sin necesidad de refutación", "Las hipótesis siempre pueden ser verificadas de manera definitiva"], "c": 0, "multi": false}, {"t": "Pedro es químico y trabaja en un laboratorio. Afirma que solo las hipótesis y teorías que son empíricamente comprobables son verdaderas y cognitivamente significativas. ¿A qué corriente de la filosofía de la ciencia adhiere Pedro?", "o": ["Al relativismo cultural", "Al verificacionismo", "Al idealismo metafísico"], "c": 1, "multi": false}, {"t": "Un grupo de investigadores de la rama de la medicina formulan una hipótesis para dar respuesta a la cura de una enfermedad neuronal. Entonces, deducen nuevos enunciados a partir de la hipótesis planteada y formulan hipótesis derivadas de la principal. Luego, establecen las consecuencias observacionales con el objeto de corroborar la hipótesis. ¿A qué pensador hacen referencia estos científicos?", "o": ["A Popper", "A Aristóteles", "A Descartes"], "c": 0, "multi": false}, {"t": "En 1962 el texto más emblemático de Tomas Kuhn llamado La estructura de la revolución científica, plantea", "o": ["El avance de la ciencia como un proceso lineal y acumulativo", "El avance de la ciencia como un proceso discontinuo", "Que la ciencia no avanza, sino que se mantiene estática"], "c": 1, "multi": false}, {"t": "Completa el enunciado seleccionando la opción correcta. Clara dirige un grupo de investigación en la universidad y les dice a sus colegas que la selección de becarios, las publicaciones de revistas especializadas, el presupuesto que reciben para trabajar, responden a factores de poder que suelen ser extra-científicos. Clara comparte con Tomás Kuhn la idea de que la ciencia está condicionada por____________", "o": ["La voluntad del superhombre", "Intereses sociales", "Únicamente la observación objetiva"], "c": 1, "multi": false}, {"t": "¿Qué implica un cambio de paradigma?", "o": ["Rechazar toda innovación científica", "Una nueva manera de ver el mundo", "Mantener siempre la visión anterior sin modificaciones"], "c": 1, "multi": false}, {"t": "Según Thomas Kuhn, ¿cuál es la diferencia entre la preciencia y la ciencia normal?", "o": ["La falta de acuerdo en lo fundamental", "La ciencia normal carece de método y organización mientras la preciencia es sistemática", "La preciencia y la ciencia normal son idénticas en todos sus aspectos"], "c": 0, "multi": false}, {"t": "El llamado Círculo de Viena sentó las bases de qué concepción", "o": ["De la teoría del superhombre de Nietzsche", "De la concepción científica del mundo que imperó en las primeras décadas del siglo XX", "Del existencialismo de Sartre"], "c": 1, "multi": false}, {"t": "La ley de gravedad de Newton constituye una teoría, coincidiendo con Popper. ¿Por qué?", "o": ["Porque describe hechos observables sin permitir predicciones", "Porque a partir de ella se pueden hacer predicciones", "Porque es una opinión personal sobre la naturaleza"], "c": 1, "multi": false}, {"t": "Popper ha sido uno de los primeros y más implacables críticos de algunas de las tesis del Círculo de Viena. Una de ellas es", "o": ["Su apoyo a la astrología como método válido", "Su crítica a la inducción", "Su defensa del dogmatismo científico"], "c": 1, "multi": false}, {"t": "¿Qué método utiliza la concepción falsacionista, elaborada por Popper, para superar al verificacionismo?", "o": ["Observacional directo", "Inductivo-experimental", "Hipotético deductivo"], "c": 2, "multi": false}, {"t": "Para Thomas Kuhn, el conocimiento en la ciencia normal es acumulativo. Ahora bien, si en la ciencia normal el conocimiento es acumulativo, ¿cuándo podemos decir que el conocimiento científico progresa?", "o": ["Cuando se mantienen siempre las mismas teorías sin cambios", "Cuando se ignoran las anomalías y se sigue el paradigma vigente sin cuestionarlo", "Cuando se produce una revolución científica"], "c": 2, "multi": false}, {"t": "Supongamos que quisiéramos justificar la generalización todos los cisnes son blancos utilizando el método inductivo. ¿Qué requisito debería satisfacer esta justificación?", "o": ["Que ningún enunciado observacional entre en contradicción con la ley universal derivada", "Que se ignore cualquier observación que contradiga la ley", "Que solo se consideren casos individuales sin buscar regularidades"], "c": 0, "multi": false}]}, {"title": "Gadamer · Hermenéutica, precomprensión, tradición", "questions": [{"t": "Para Gadamer el trabajo de la comprensión hermenéutica exhibe los siguientes rasgos. Selecciona las 2 (dos) opciones correctas", "o": ["Se basa únicamente en la experimentación y los datos cuantitativos", "Toma distancia de los cánones establecidos por las ciencias naturales", "Rechaza todo tipo de interpretación subjetiva", "La verdad para las ciencias del espíritu opera a nivel de la comprensión de los fenómenos en su concreción histórica"], "c": [1, 3], "multi": true, "n": 2}, {"t": "Para Gadamer comprender e interpretar textos pertenece con toda la evidencia a la experiencia humana del mundo.", "o": ["Verdadero", "Falso"], "c": 0, "multi": false}, {"t": "En el proceso hermenéutico, el intérprete parte de una situación temporal distinta y distante del texto. A esta diferencia de concepciones y percepciones del intérprete, ¿cómo la llama Gadamer?", "o": ["Perspectiva inmutable", "Realidad objetiva", "Horizontes de sentido"], "c": 2, "multi": false}, {"t": "Hans Georg Gadamer es un autor reconocido por sus aportes a", "o": ["La hermenéutica", "La fenomenología de la conciencia", "La teoría del valor trabajo"], "c": 0, "multi": false}, {"t": "En la discusión que mantenían, Julia planteó una visión diferente acerca del prejuicio, defendiendo la idea de que el prejuicio no debe necesariamente ser visto como una fuente de error, sino como un modo de experimentar otras formas de comprensión. ¿Cómo se relaciona esta mirada con Gadamer?", "o": ["En que Gadamer considera que todos los prejuicios son necesariamente erróneos", "En que Gadamer sostiene que la comprensión depende únicamente de la objetividad científica", "En que Gadamer recupera la idea de prejuicio para mostrar su carácter constitutivo de la comprensión"], "c": 2, "multi": false}, {"t": "Para Gadamer en la comprensión se debe Selecciona las 3 (tres) opciones correctas:", "o": ["Seleccionar entre los proyectos de sentido previos aquellos que no resultan arbitrarios", "Aplicar únicamente métodos científicos sin considerar el contexto del texto", "Ser receptivo a la alteridad del texto en el desempeño del ejercicio hermenéutico", "Ignorar cualquier interpretación externa y centrarse solo en la propia opinión", "Dejarnos interpelar por la opinión ajena"], "c": [0, 2, 4], "multi": true, "n": 3}, {"t": "Tomás está escribiendo una crítica acerca de un film sobre la Segunda Guerra Mundial. Para realizar una interpretación satisfactoria del guion, Tomás parte de sus propias concepciones sobre el tema. ¿Qué tipo de abordaje realiza Tomás?", "o": ["Hermenéutico", "Positivista", "Experimental"], "c": 0, "multi": false}, {"t": "Gadamer busca mostrar que no existe una oposición excluyente entre autoridad y razón. Al hacer esto asume una mirada crítica con respecto a la Ilustración. ¿Por qué?", "o": ["Porque la Ilustración niega toda forma de conocimiento racional", "Porque la Ilustración promueve ciegamente la obediencia sin razonamiento", "Porque la Ilustración se levanta contra el concepto de autoridad desde su énfasis en el sujeto como ser racional portador y custodio de su autonomía"], "c": 2, "multi": false}, {"t": "La crítica que Gadamer realiza al concepto de autoridad tal como fue entendido por la Ilustración, ¿a qué está dirigida?", "o": ["A afirmar que la autoridad debe ser impuesta por la fuerza para garantizar el orden", "A mostrar que la noción de autoridad refiere a algo que no es contrario a la razón y la libertad", "A sostener que toda autoridad es incompatible con el pensamiento crítico"], "c": 1, "multi": false}, {"t": "Para Gadamer, la comprensión solo es posible cuando se accede al texto, ¿desde dónde?", "o": ["La precomprensión", "La ignorancia total", "La simple lectura literal"], "c": 0, "multi": false}, {"t": "Hans-Georg Gadamer, en su obra Verdad y método (1960), fijó los presupuestos y objetivos de la corriente hermenéutica. ¿Cuáles de las siguientes opciones representan nociones de la filosofía hermenéutica? Selecciona las 4 (cuatro) opciones correctas", "o": ["Determinismo", "Interpretación", "Comprensión", "Historia", "Precomprensión"], "c": [1, 2, 3, 4], "multi": true, "n": 4}, {"t": "¿Qué movimiento para Gadamer constituye una pieza esencial de la comprensión?", "o": ["Seguir únicamente la interpretación literal de los textos", "Tener en cuenta los prejuicios propios para poder reconocerlos", "Rechazar cualquier influencia histórica o cultural"], "c": 1, "multi": false}, {"t": "Juan está interpretando un texto sobre la Revolución Francesa y, en este proceso, parte de una situación temporal distinta y distante a la del texto. ¿Cómo denomina Gadamer este proceso?", "o": ["Círculo hermenéutico", "Reducción fenomenológica", "Método deductivo"], "c": 0, "multi": false}, {"t": "¿Qué problemas destaca Gadamer sobre la influencia de la metodología científica? Selecciona las 2 (dos) opciones correctas", "o": ["Que sujeta el razonamiento a una cadena causal en nombre de la objetividad", "Que ha impedido a las ciencias del espíritu fundamentar sus propias pretensiones de verdad", "Que promueve la arbitrariedad en la investigación", "Que fomenta la interpretación subjetiva sin normas"], "c": [0, 1], "multi": true, "n": 2}, {"t": "Un estudio impulsado por Twitter detecta que la difusión de bulos en las redes afecta a todos los ámbitos, pero sobre todo al político. Cuando sentimos o juzgamos verdadero, apresuradamente, datos o información sin conocer si ha sido sometido a un examen riguroso, tendemos a formar un tipo específico de prejuicio conocido como", "o": ["Los de confirmación", "Los de autoridad", "Los de precipitación"], "c": 2, "multi": false}, {"t": "Gadamer reclama, para la hermenéutica filosófica, un carácter de universalidad. ¿A qué se aplica la comprensión hermenéutica?", "o": ["Únicamente a leyes matemáticas", "Solo a teorías científicas", "A textos, pinturas, música"], "c": 2, "multi": false}, {"t": "Gadamer sostiene que hay que tener en cuenta la distancia temporal en el proceso de la comprensión, entre el autor y el intérprete.", "o": ["Verdadero", "Falso"], "c": 0, "multi": false}, {"t": "¿A qué hace referencia el concepto de tradición para Gadamer? Selecciona las 4 (cuatro) opciones correctas", "o": ["Se refiere únicamente a creencias individuales sin influencia histórica", "Al verdadero ser histórico de las personas", "Refiere a una posible experiencia de verdad", "Remite a aquellas prácticas, ideas, conocimientos y realidades que se han consagrado y transmitido a través del transcurso del tiempo", "Siempre se encuentra presente en todo acontecer histórico"], "c": [1, 2, 3, 4], "multi": true, "n": 4}, {"t": "Cintia está analizando una pintura que se exhibe en un importante museo metropolitano; para llegar a comprender la esencia de la obra, se para frente al cuadro, dejando de lado cualquier prejuicio o conocimiento previo. ¿Qué método usa Cintia para comprender la pintura?", "o": ["La teoría del superhombre de Nietzsche", "El método hipotético-deductivo de Popper", "La reducción fenomenológica de Husserl"], "c": 2, "multi": false}, {"t": "Según Rawls, los principios de justicia, fruto de un acuerdo de la posición inicial, deben ser principios que todos puedan acoger voluntariamente.", "o": ["Verdadero", "Falso"], "c": 0, "multi": false}]}, {"title": "Rawls y Honneth · Justicia, reconocimiento, derechos", "questions": [{"t": "En la posición original planteada por Rawls, bajo el velo de la ignorancia, ¿cómo se encuentran los individuos?", "o": ["Determinados por su riqueza y privilegios", "En condiciones de igualdad", "Con pleno conocimiento de su posición social"], "c": 1, "multi": false}, {"t": "¿Qué forma de reconocimiento para Honneth le posibilitará al sujeto aprender sentimientos y necesidades con confianza?", "o": ["El amor", "La autoridad", "La tradición"], "c": 0, "multi": false}, {"t": "En los últimos tiempos, son cada vez más numerosos los reclamos de los pueblos originarios movilizados. Piden justicia distributiva y respeto por la identidad cultural. Desde la perspectiva de Axel Honneth, ¿qué implican los reclamos de estos pueblos?", "o": ["La lucha por el reconocimiento dentro de las esferas del derecho y de la solidaridad", "La aceptación pasiva de las jerarquías sociales", "La búsqueda exclusiva de ganancias económicas"], "c": 0, "multi": false}, {"t": "Rawls establece, a partir de su lógica contractual, principios que deben caracterizar a una sociedad justa. ¿Cómo denomina Rawls a uno de estos principios?", "o": ["Principio de jerarquía social rígida", "Principio de igualdad absoluta sin distinciones", "Principio de diferencia"], "c": 2, "multi": false}, {"t": "Muchos filósofos opinan que Rawls hizo una importante contribución a la filosofía política. ¿Por qué razón es considerada de relevancia la filosofía de John Rawls?", "o": ["Porque se centró exclusivamente en la economía y el mercado", "Porque promovió la abolición de todas las leyes civiles", "Porque reinstaló el rol central de la teorización sobre la justicia"], "c": 2, "multi": false}, {"t": "Rawls realiza una enumeración de libertades básicas para considerar justa a una sociedad. ¿Cuáles de las siguientes opciones ejemplifican esas libertades? Selecciona las 4 (cuatro) opciones correctas", "o": ["Derecho de pensamiento", "Derecho a monopolizar recursos sin límites", "Derecho de reunión", "Derecho a voto", "Derecho a no ser detenido arbitrariamente"], "c": [0, 2, 3, 4], "multi": true, "n": 4}, {"t": "¿Cuál de las siguientes expresiones corresponde a un elemento central del acuerdo hipotético que planea Rawls sobre los principios de la justicia?", "o": ["Autoritarismo", "Imparcialidad", "Tradición cultural obligatoria"], "c": 1, "multi": false}, {"t": "Rawls se propone elaborar una concepción de la justicia que supere las insuficiencias, ¿de qué corriente?", "o": ["Del marxismo", "Del utilitarismo", "Del contractualismo"], "c": 1, "multi": false}, {"t": "Catalina, militante feminista, dice que su lucha es por la igualdad y el respeto de todas las mujeres. Siguiendo a Honneth, ¿dónde podemos ubicar a los reclamos feministas?", "o": ["La esfera del amor", "La esfera del derecho", "La esfera de la solidaridad"], "c": 1, "multi": false}, {"t": "Consideremos la situación de que las personas no se sientan reconocidas en su trabajo. En este caso, la dimensión de solidaridad de acuerdo con Honneth se ve dañada. ¿Qué puede implicar la desconsideración de esta forma de reconocimiento? Seleccione las 4 (cuatro) opciones correctas", "o": ["Deshonra", "Discriminación", "Autotrascendencia", "Invisibilidad", "Marginación"], "c": [0, 1, 3, 4], "multi": true, "n": 4}, {"t": "Supongamos que estamos en la posición original de la que habla Rawls y que nos encontramos cubiertos por un velo de ignorancia. Nadie sabe cuál es el lugar en la sociedad, la posición, clase o status social de los demás. ¿Qué sentido tiene este hecho?", "o": ["Para que se pueda favorecer a los que ya poseen poder o influencia social", "Para que algunas personas tengan privilegios sobre otras según su riqueza", "Es para asegurar que nadie adopte posiciones de ventaja o desventaja producto de la fortuna o por las circunstancias sociales en que han vivido los sujetos"], "c": 2, "multi": false}, {"t": "En su discurso, Honneth enfatizó que la misión de este proyecto consistía en implementar una serie de prácticas sociales orientadas a que las personas perciban determinadas cualidades y capacidades suyas como valiosas. Reforzar la autoestima, dijo, es una pieza central. ¿A qué forma de reconocimiento hace referencia?", "o": ["Al reconocimiento que fomenta la solidaridad", "Al reconocimiento basado únicamente en el poder económico", "Al reconocimiento que se da solo por obediencia"], "c": 0, "multi": false}, {"t": "¿Cuál es el elemento central, en el acuerdo hipotético de la situación inicial que plantea Rawls, sobre los principios de la justicia?", "o": ["La acumulación de poder como principio rector de la justicia", "La imparcialidad como uno de los principios de la justicia", "La tradición como único criterio de justicia"], "c": 1, "multi": false}, {"t": "Según Rawls, ¿cómo se demuestra el equilibrio reflexivo entre las partes? Seleccione las 4 opciones correctas", "o": ["Pueden exponer sus argumentos", "Se escuchan mutuamente", "Ignoran los argumentos de los demás", "Reconocen la razón de los otros", "Son razonables"], "c": [0, 1, 3, 4], "multi": true, "n": 4}, {"t": "Hay una forma de reconocimiento para Honneth vinculada a la praxis social del derecho.", "o": ["Verdadero", "Falso"], "c": 0, "multi": false}, {"t": "¿A qué se refiere John Rawls con la noción de Posición inicial?", "o": ["Es una situación histórica concreta en la que ciertos grupos dominan a otros sin posibilidad de igualdad", "Es un acuerdo basado en tradiciones culturales y religiosas específicas, no en la igualdad racional", "Es un acuerdo original, al que llegarían personas libres y racionales interesadas en promover sus propios fines, en una situación inicial de igualdad"], "c": 2, "multi": false}, {"t": "De acuerdo al Informe sobre el impacto de la COVID-19 en colectivos en exclusión social, todas las entidades coinciden en que la pandemia podría elevar la exclusión social. ¿Cómo se relaciona la situación con la forma de menosprecio correlativa al derecho para Honneth?", "o": ["Supone la igualdad absoluta sin necesidad de derechos", "Significa que las personas reciben un reconocimiento exagerado", "La negación de esta forma de reconocimiento es la desposesión de determinadas prerrogativas legítimas"], "c": 2, "multi": false}, {"t": "Mario ha colaborado en la construcción de un jardín maternal en su barrio. Además, ha organizado una colecta para comprar alimentos para el merendero del barrio. Pese a esto, no se siente reconocido en su barrio. Siguiendo a Honneth, ¿qué esfera del reconocimiento se ve afectada en Mario?", "o": ["La esfera de la solidaridad", "La esfera legal", "La esfera familiar"], "c": 0, "multi": false}, {"t": "Cuáles de las siguientes opciones son nociones sobre la identidad personal vinculadas a la filosofía de Axel Honneth. Seleccione las 4 (cuatro) opciones correctas", "o": ["Autoestima", "Autorespeto", "Reconocimiento", "Autoconfianza", "Voluntad de poder"], "c": [0, 1, 2, 3], "multi": true, "n": 4}, {"t": "Liliana, estudiante del último año de la secundaria, quiere dejar en funcionamiento el Centro de Estudiantes de su colegio. Por eso, les manifiesta a sus compañeros que coincide con lo sostenido por Rawls. ¿Qué constituyen para Liliana la libertad de pensamiento y de opinión?", "o": ["Privilegios opcionales según la clase social", "Derechos básicos fundamentales para la ciudadanía", "Reglas secundarias que no afectan la participación ciudadana"], "c": 1, "multi": false}]}, {"title": "Repaso integral · Preguntas de varios autores", "questions": [{"t": "La filosofía del siglo XX es muy variada en temáticas. Entre ellas podemos mencionar Selecciona las 4 (cuatro) opciones correctas:", "o": ["La aparición de corrientes epistémicas como el positivismo lógico", "La visión estructuralista", "El giro lingüístico", "El giro antropológico", "La filosofía del lenguaje"], "c": [0, 1, 2, 4], "multi": true, "n": 4}, {"t": "Ante las quejas constantes de Mara, sobre su angustia frente a la posibilidad de la muerte, Ángel le dice que sólo le caben dos posibilidades: aceptarla o distraerse, para tratar de eludirla. Según Heidegger, ¿qué nos queda, si aceptamos la posibilidad de la muerte y convivimos con esa aceptación?", "o": ["A una existencia auténtica", "A la negación total de la vida", "A una existencia determinada únicamente por otros"], "c": 0, "multi": false}, {"t": "Lucas está estudiando Filosofía. Entiende que la misma consiste en el ejercicio de un pensamiento autorreflexivo, porque el acto de pensar no se distingue del producto de esa actividad. Cuando se reflexio
