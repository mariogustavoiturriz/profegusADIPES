na sobre lo que el pensar es, es el pensar mismo el que plantea la pregunta por su esencia. ¿A qué filósofo corresponde la reflexión de Lucas?", "o": ["Kant", "Hegel", "Descartes"], "c": 1, "multi": false}, {"t": "¿Qué corriente filosófica alcanza con Hegel su punto culminante?", "o": ["El idealismo", "El materialismo", "El empirismo"], "c": 0, "multi": false}, {"t": "Malena sostiene que la decadencia de la filosofía occidental comenzó con Sócrates. ¿Con qué filósofo coincide Malena?", "o": ["Platón", "Kant", "Nietzsche"], "c": 2, "multi": false}, {"t": "Rawls plantea dos principios de justicia. ¿A qué hace referencia el primero de ellos?", "o": ["Que algunas personas pueden gozar de más libertades que otras sin restricción", "Que las libertades básicas deben distribuirse según la riqueza de cada individuo", "Toda persona tiene igual derecho a un régimen plenamente suficiente de libertades básicas iguales, que sea compatible con un régimen similar de libertades para todos"], "c": 2, "multi": false}, {"t": "Según Popper, el objetivo de la ciencia es la obtención de las teorías cada vez más verosímiles, es decir, más cercanas a la verdad.", "o": ["Verdadero", "Falso"], "c": 0, "multi": false}, {"t": "Gabriel está meditando y, poco a poco, con esta práctica, siente que se conoce mejor a sí mismo. Por tal razón, puede comprender mejor al prójimo y ayudar en su entorno social. ¿Qué pensador se refiere a la relación entre la práctica del sujeto sobre sí mismo y el acceso a la verdad?", "o": ["Michel Foucault", "Immanuel Kant", "Karl Marx"], "c": 0, "multi": false}, {"t": "¿Cuáles de las siguientes son nociones pertenecientes a la filosofía existencial? Selecciona las 4 (cuatro) opciones correctas", "o": ["El ser y el tiempo", "El desvelamiento del ser", "El ser y la nada", "La angustia", "Mundo de las ideas"], "c": [0, 1, 2, 3], "multi": true, "n": 4}, {"t": "Inés está convencida de que posee la verdad. Se expresa de una manera que no deja un mínimo resquicio para la duda. Su manera de pensar es dicotómica: o bien algo es verdadero, o bien es falso. Si relacionamos la forma de pensar de Inés con las palabras de Nietzsche, ¿qué podríamos decirle?", "o": ["Todo lo que expresas parece sostenerse en conceptos absolutizados", "Tu pensamiento refleja la completa libertad del espíritu sin restricciones", "Estás adoptando un enfoque perspectivista correcto"], "c": 0, "multi": false}, {"t": "Supongamos que tenemos una proposición que el entendimiento ve como firme (por ejemplo, la monarquía es orden), y que esta proposición es sustituida por su opuesto (la monarquía es desorden, ¡orden republicano!). ¿A qué elementos de la dialéctica hace referencia?", "o": ["A la síntesis y a la comprobación", "A la tesis y a la antítesis", "A la observación y la inducción"], "c": 1, "multi": false}, {"t": "Daniel les comenta a sus amigos que, últimamente, está descreído de todo. Su única certeza es que es imposible saber algo de verdad, que no existen los valores absolutos. ¿En qué postura filosófica se ubica Daniel?", "o": ["Nihilista", "Aristotélica", "Platónica"], "c": 0, "multi": false}, {"t": "El avance de la ciencia para Kuhn se produce de manera", "o": ["Continua", "Prolongada y lineal", "Discontinua"], "c": 2, "multi": false}, {"t": "¿Qué significa la expresión voluntad de poder?", "o": ["La sumisión a normas externas para alcanzar seguridad", "La búsqueda exclusiva del placer físico", "La autoafirmación de la vida sin ningún sometimiento"], "c": 2, "multi": false}, {"t": "Diego, discutiendo sobre política con sus compañeros de la facultad, afirma que el socialismo es una etapa transitoria y que la verdadera revolución será construir una sociedad comunista, caracterizada por la eliminación de todas las desigualdades. ¿A quién pertenece la idea de sociedad comunista?", "o": ["A Marx", "A Nietzsche", "A Rawls"], "c": 0, "multi": false}, {"t": "Juan le explica a su hijo que, cuando alguien le proponga una idea u opinión que él no comparta, busque una propia, para contrarrestarla, y luego analice ambas para llegar a una síntesis. ¿Qué método le está enseñando Juan a su hijo?", "o": ["La reducción fenomenológica", "La dialéctica", "El método inductivo"], "c": 1, "multi": false}, {"t": "Consideremos las siguientes libertades básicas: derecho a voto, derecho a desempeñar puestos públicos, libertad de expresión, de conciencia, de pensamiento. ¿Por qué diríamos que, en su conjunto, refieren al primer principio de justicia?", "o": ["Porque exige la igualdad en la repartición de derechos básicos", "Porque prioriza exclusivamente los privilegios de los más fuertes", "Porque ignora las necesidades de los menos favorecidos"], "c": 0, "multi": false}, {"t": "¿Para qué filósofo la verdad es asunto de perspectiva; lo que se manifiesta como verdad y como realidad depende en gran medida de la perspectiva?", "o": ["Nietzsche", "Kant", "Descartes"], "c": 0, "multi": false}, {"t": "Completa este enunciado: Según Ortega y Gasset, la vida es un proyecto mediado por _____", "o": ["La voluntad de poder", "Las circunstancias y mi perspectiva", "La esencia inmutable del ser"], "c": 1, "multi": false}, {"t": "Hablando sobre algunas técnicas actuales de liderazgo, Belén repitió una frase que se escucha muy a menudo: \"cada instante es único, pero eterno, ya que en él se encuentra todo el sentido de la existencia\". Si esta frase se convierte en una máxima sobre la reivindicación de la vida, ¿a qué doctrina podríamos asociarla?", "o": ["A la doctrina del eterno retorno", "Al empirismo de Hume", "Al determinismo de Hobbes"], "c": 0, "multi": false}]}, {"title": "🎲 Simulacro aleatorio · 20 preguntas mezcladas de todas las tandas", "random": true, "questions": []}]}, "tecnologia": {"nombre": "Tecnología e Innovación Educativa", "subtitulo": "Segundo Parcial · Módulos 3 y 4 · Banco consolidado de 3 tests + PDF", "color1": "#1a5490", "color2": "#143d68", "accent": "#00b894", "icon": "💻", "tandas": [{"title": "Alfabetización digital · Dimensiones y procesos", "questions": [{"t": "Teresa está participando de un taller de computación en el centro de jubilados. Desde que inició ha ido desarrollando nuevas habilidades en el uso de su PC y ya no tiene dudas sobre cómo leer el diario en versión digital o descargar las fotos de su celular. ¿Qué proceso está atravesando Teresa?", "o": ["Alfabetización digital, porque desarrolla competencias vinculadas al manejo de información", "Alfabetización informacional, porque desarrolla competencias vinculadas al manejo de información", "Alfabetización tecnológica, porque desarrolla competencias vinculadas al manejo de las TIC"], "c": 2, "multi": false}, {"t": "Un caso de una señora mayor que aprendió a leer el diario digital y enviar mensajes corresponde a", "o": ["Alfabetización Digital", "Alfabetización Tecnológica", "Alfabetización Informacional"], "c": 0, "multi": false}, {"t": "La dirección académica del profesorado en Artes se niega a incorporar propuestas educativas con TIC, a pesar de la demanda de los estudiantes. ¿Qué característica de la alfabetización digital está afectando?", "o": ["El aprendizaje digital, porque no apuestan a la implementación", "El aprendizaje tecnológico, porque no apuestan a la implementación", "El aprendizaje electrónico, porque no apuestan a la implementación y desarrollo de las TIC"], "c": 2, "multi": false}, {"t": "¿En qué aspecto de la humanidad tiene importancia la alfabetización digital?", "o": ["En el desarrollo del hombre", "En el desarrollo de la educación", "En el desarrollo de la sociedad"], "c": 0, "multi": false}, {"t": "¿Con qué otro nombre se conoce a la alfabetización digital?", "o": ["Alfabetización tecnológica", "Alfabetización informacional"], "c": 0, "multi": false}, {"t": "En el análisis de la alfabetización, predominan algunas dimensiones que es preciso tener en cuenta. ¿Cuáles son? Marque 2 opciones correctas", "o": ["Escritura", "Creatividad", "Acceso", "Lectura"], "c": [2, 3], "multi": true, "n": 2}, {"t": "Una empresa de la zona ha donado a la escuela de Soto algunas computadoras que no estaban en uso. Una vez instaladas, el técnico de la institución comunicó que no sería posible el uso inmediato, ya que el sistema operativo de los equipos era muy antiguo y no permitía utilizar la red de wifi, ni tampoco instalar programas básicos como los de Microsoft. ¿Qué dimensión de la alfabetización digital representa tal suceso?", "o": ["La dimensión comunicacional, porque no pueden usarse las computadoras", "La dimensión informacional, porque no pueden usarse las computadoras", "La dimensión tecnológica, porque no pueden usarse las computadoras para acceder a la información"], "c": 2, "multi": false}, {"t": "¿Cuáles son las dimensiones que implica la alfabetización digital? Marque 3 opciones correctas", "o": ["Dimensión pedagógica", "Dimensión tecnológica", "Dimensión filosófica", "Dimensión personal/social", "Dimensión informacional"], "c": [1, 3, 4], "multi": true, "n": 3}, {"t": "Las alfabetizaciones múltiples, ¿qué presencias implican en el contexto actual? Marque 3 opciones correctas", "o": ["Un avance en el desarrollo del hombre", "Un conocimiento más que rudimentario", "Una indicación de la posición ideológica", "Un nivel de competencia"], "c": [1, 2, 3], "multi": true, "n": 3}, {"t": "¿Cuál es la clave que deben tener en cuenta los usuarios críticos a fin de establecer juicios de credibilidad?", "o": ["No adoptar medidas y procedimientos múltiples de juicios", "Adoptar medidas y procedimientos múltiples de juicios"], "c": 1, "multi": false}, {"t": "Si decimos que internet permite mantener oculta la identidad del usuario pudiendo reemplazar esta por un apodo o palabra y números sin sentido, ¿a qué nos estamos refiriendo?", "o": ["Contenidos digitales", "Comunicación online o forma y contenido como cuestiones de acceso"], "c": 1, "multi": false}, {"t": "Desarrollos tecnológicos comunicacionales en el ámbito escolar son", "o": ["WhatsApp, Facebook y Twitter", "Foro, chat y correo electrónico", "Foro, chat y WhatsApp"], "c": 1, "multi": false}, {"t": "Adquirir técnicas de acceso no es suficiente para lograr un uso eficaz en la red. Se requieren también predisposiciones y actitudes personales. ¿Cuáles son 2 de las posibles reacciones de los principiantes frente a dificultades desconocidas? Seleccione 2 opciones correctas", "o": ["Los que investigan de forma no lineal", "Los que vagan por la red y prueban diversas cosas", "Los que permanecen dentro de los límites conocidos"], "c": [1, 2], "multi": true, "n": 2}, {"t": "Para la planificación de una clase con TIC se requiere tomar decisiones de tipo pedagógicas respecto a", "o": ["Los objetivos de enseñanza, la estructura de la clase y las actividades", "Los objetivos de aprendizaje, la estructura de la clase y los contenidos", "Los objetivos de aprendizaje, la estructura de la clase y las actividades"], "c": 2, "multi": false}, {"t": "Criterio principal a tener en cuenta para ser crítico frente a la tecnología", "o": ["Poner en juego varios tipos de juicios", "Que haya una buena conexión a internet"], "c": 0, "multi": false}, {"t": "Cuando hablamos de las propiedades personales que los usuarios requieren a los fines de acceder realmente a las TIC, ¿a qué nos referimos?", "o": ["Criterios técnicos", "Criterios de acceso", "Criterios educativos"], "c": 1, "multi": false}, {"t": "Para un trabajo de investigación, a los alumnos de 3er grado se les ha solicitado consultar periódicos, revistas de divulgación, estudios científicos y otros textos cuyo lenguaje no es demasiado comprensible para estudiantes de esa edad. ¿Cuál debería ser el rol del docente en el desarrollo de esta actividad?", "o": ["El docente debe establecer el puente entre los textos y los alumnos, para asegurar la comprensión de los materiales", "El alumno debe establecer el puente entre los textos y los docentes, para asegurar la comprensión"], "c": 0, "multi": false}, {"t": "Para la redacción de un informe sobre contaminación ambiental, Sergio busca información en la web, comenzando por la página de la secretaría de medio ambiente, y a partir de ella seleccionando y analizando otros sitios de ONGs, artículos científicos, empresas verdes vinculados a la temática. ¿Qué tipo de usuario consideras que es Sergio?", "o": ["Un hiperlector, porque observa y analiza los enlaces según sus intereses", "Un navegador, porque busca información que le interesa en la web", "Un hiperlector, porque observa y analiza los enlaces de manera crítica"], "c": 2, "multi": false}, {"t": "Cuando afirmamos que en internet hay información relevante, ofertas comerciales, información trivial, cosas no deseadas estamos haciendo referencia a", "o": ["Contenidos", "Capacidades"], "c": 0, "multi": false}, {"t": "Mario está preparando su tesis de maestría y al momento de buscar información en la web para construir su marco teórico se enfrenta con algunos interrogantes. ¿Cuáles de las siguientes opciones se corresponden con los mismos? Marque 4 opciones correctas", "o": ["Qué no tiene sentido, ya que debe seleccionar la información relevante", "Qué tiene sentido, ya que debe seleccionar la información relevante", "Qué es lo relevante, porque no debe perder de vista el objetivo", "Qué vale la pena procesar, porque no puede procesar todo", "Qué se debe creer, para tener algunas hipótesis de trabajo"], "c": [1, 2, 3, 4], "multi": true, "n": 4}]}, {"title": "Acceso a las TIC · Condiciones, forma y contenido", "questions": [{"t": "El acceso a las TIC parte de ciertos interrogantes que son clave en su abordaje. ¿Cuáles son esas preguntas? Seleccione las 2 opciones correctas", "o": ["¿Acceso para quién?", "¿Acceso a qué?", "¿Acceso para qué?"], "c": [0, 1], "multi": true, "n": 2}, {"t": "¿Cuáles son los niveles para identificar las condiciones de acceso a las TIC? Marque las 4 opciones correctas", "o": ["Acceso informacional", "Acceso práctico", "Acceso técnico", "Técnicas, actitudes y predisposiciones", "Formas y contenido"], "c": [1, 2, 3, 4], "multi": true, "n": 4}, {"t": "Cuando hablamos de acceso a las TIC nos referimos particularmente a las condiciones y recursos técnicos que posibilitan que un usuario utilice las tecnologías.", "o": ["Verdadero", "Falso"], "c": 1, "multi": false}, {"t": "La escuela N°112 de Argüello ha desarrollado un programa de acompañamiento y tutoría de TIC para estudiantes de primaria. Si bien no todos tienen PC y conexión a internet en sus casas, la institución cuenta con algunos equipos con módem inalámbrico para préstamo. ¿Considera que estos alumnos tienen acceso a las TIC?", "o": ["No, porque más allá de tener una PC con conexión a internet, no se están formando en competencias para su uso", "Sí, porque más allá de tener una PC con conexión a internet, se están formando en competencias para su uso"], "c": 1, "multi": false}, {"t": "Al analizar las cuestiones de acceso a la red podemos observar, entre otras cosas, cuestiones de forma y de contenido. En lo que respecta a la forma, ¿cuál de las siguientes opciones refiere a la misma?", "o": ["La arquitectura básica de la web y el diseño de la interfaz", "La forma en que los sitios web están entrelazadas entre sí y la ingeniería de la interfaz"], "c": 0, "multi": false}, {"t": "La escuela Fray Mamerto Esquiú ha implementado un proyecto de TIC en el que docentes y alumnos integran grupos de trabajo con el objetivo de desarrollar múltiples competencias de uso y reflexión con objetivos pedagógicos. ¿Qué niveles tendrías en cuenta para identificar las condiciones de acceso de la institución? Marque 4 opciones correctas", "o": ["Acceso práctico, porque el trabajo tiene una naturaleza puntual", "De predisposición para el trabajo educativo, ya que determina el uso eficaz", "De forma, porque se utiliza el entorno web", "Acceso técnico, porque tienen las herramientas", "De método, porque se utiliza el entorno web"], "c": [0, 1, 2, 3], "multi": true, "n": 4}, {"t": "Cuando hablamos de cuestiones relacionadas con el acceso, podríamos distinguir entre condiciones y criterios. ¿A qué refieren las condiciones?", "o": ["A las características de las personas que trabajan en las escuelas", "A las características de las personas que trabajan en el ciberespacio", "A las características de las personas que trabajan en empresas"], "c": 1, "multi": false}, {"t": "Joaquín ha asistido a la clase de consulta del profesor Fernández para la materia Herramientas Matemáticas I. Durante la clase Fernández le ha mostrado paso a paso cómo resolver un ejercicio y le ha pedido que resuelva otro él solo, mientras ha ido supervisando su tarea. ¿Qué área de estudio representa la interacción que ha sostenido Joaquín con el profesor?", "o": ["Apropiación de los contenidos, porque se muestra la instancia de ejercitación", "Interacciones didácticas, porque muestra el diálogo entre alumno y docente"], "c": 1, "multi": false}, {"t": "Daniela está estudiando la evolución de la tecnología en los ámbitos educativos. Mientras da curso a su búsqueda, de pronto se da cuenta que en su trabajo está vivenciando una de las etapas que está estudiando. ¿Qué parte de la historia de las TIC en educación representa su reflexión?", "o": ["La 1ra revolución, porque está viviendo el desarrollo de medios electrónicos", "La 2da revolución, porque está viviendo el desarrollo de medios electrónicos", "La 3ra revolución, porque está viviendo el desarrollo de medios electrónicos", "La 4ta revolución, porque está viviendo el desarrollo de medios electrónicos y la digitalización"], "c": 3, "multi": false}, {"t": "A una semana de las elecciones presidenciales, un periódico digital opositor publicó un titular que se llevó la atención de muchos lectores: \"En Argentina cada año hay 15% más de pobres\". Además de la tipografía mayúscula, una foto que mostraba a una familia durmiendo en la calle acompañaba la nota. Como usuario crítico, ¿qué interrogante te harías frente a este artículo?", "o": ["¿A qué intereses responde esta información?, ya que no es casual el momento en que se publica", "¿A qué se debe el aumento de la pobreza en Argentina?"], "c": 0, "multi": false}, {"t": "Si hablamos de los métodos de enseñanza que ayudan a los alumnos a desarrollar con éxito el conocimiento y las competencias que se requieren en la era digital, ¿a qué concepto nos referimos?", "o": ["Objetividad", "Calidad", "Cantidad"], "c": 1, "multi": false}, {"t": "¿Qué implica que un usuario de la web sea crítico?", "o": ["La subjetividad de la información", "La evaluación de la información", "La falsedad de la información"], "c": 1, "multi": false}, {"t": "Para una misma actividad Pablo y Pedro buscaron información en internet sobre la teoría Psicoanalítica. Pablo utilizó como fuente principal un paper que retoma los aportes principales de Freud y Pedro retomó un documental de Psicoactiva. ¿Qué concepto da cuenta de estos abordajes?", "o": ["La lectura activa, porque combina la lectura con el pensamiento crítico", "La hiperlectura, porque no existe una manera única de leer", "La lectura pasiva, porque combina la lectura con el pensamiento pasivo"], "c": 1, "multi": false}, {"t": "En el 2003 se llevó a cabo una conferencia previa a la cumbre mundial sobre la sociedad de la información. ¿Cuáles fueron las claves respecto a dicho efecto? Marque 4 opciones correctas", "o": ["Sociedad de la comunicación, porque es el contexto en el que se encuentra la sociedad actual", "Progreso social y económico, ya que ocupa un lugar preponderante en la sociedad de la información", "Sociedad de la información, porque es el contexto en el que se encuentra la sociedad actual", "Usuarios clave, ya que deben buscarse perfiles profesionales adecuados", "Aprendizaje electrónico, porque es necesario para desarrollar y ejecutar redes educativas"], "c": [1, 2, 3, 4], "multi": true, "n": 4}, {"t": "Una de las características del proceso comunicativo es que los mensajes no necesariamente incluyen un meta mensaje.", "o": ["Verdadero", "Falso"], "c": 1, "multi": false}, {"t": "¿Cuáles son algunos de los propósitos para evaluar a los alumnos? Marque 4 opciones correctas", "o": ["Rendición de cuentas y/o propósitos financieros de la institución", "Mejorar y extender el aprendizaje de los estudiantes", "Seleccionar estudiantes que pueden continuar sus estudios y promoción profesional", "Proporcionar al profesor información sobre la eficacia de su enseñanza", "Monitorear a los estudiantes para saber si han avanzado"], "c": [0, 1, 2, 3], "multi": true, "n": 4}, {"t": "María está estudiando el funcionamiento del sistema digestivo y para poder comprenderlo ha dibujado la silueta humana e identificado con color cada uno de los órganos y sus funciones. ¿Qué área de estudio representa esta actividad?", "o": ["Estrategias de apropiación, porque vincula a María con el contenido", "Elaboración de materiales de enseñanza"], "c": 0, "multi": false}, {"t": "A partir de un intercambio educativo, el profesor de matemática ha articulado una red de docentes latinoamericanos que conforman un equipo de profesores y dos veces a la semana realizan conferencias virtuales abiertas para acompañar a jóvenes de entre 10 y 20 años en el abordaje de la disciplina. ¿Qué aspecto de la sociedad de la información representan estos docentes?", "o": ["Usuarios educacionales, porque forman una red de aprendizaje", "Usuarios clave, porque forman una red de aprendizaje", "Usuarios digitales, porque forman una red de aprendizaje"], "c": 1, "multi": false}, {"t": "¿Qué elementos incluye la estructura de la enseñanza?", "o": ["La elección, el recorte y la secuencia del plan de estudio y la desorganización deliberada de las actividades", "La elección, el recorte y la secuencia del plan de estudio y la organización deliberada de las actividades por parte del docente", "La elección, el recorte y la secuencia del plan de estudio y la organización deliberada de las actividades por parte del alumno"], "c": 1, "multi": false}, {"t": "Considerando la implementación de la tecnología en el aula, ¿cómo se denomina al hecho de eliminar las posibles estrategias de análisis que encaran los docentes cuando esa eliminación parte del reconocimiento del valor del material?", "o": ["Tecnología silenciada", "Didáctica silenciosa"], "c": 1, "multi": false}]}, {"title": "Lectura y hipertexto · Funciones, hiperlectura, libro de texto", "questions": [{"t": "Para la próxima clase de lengua los alumnos de 5to deben leer el Martín Fierro. Según las indicaciones de la profesora el proceso de comprensión sería igual ya sea que accedan al material a través de libro en papel o desde la web. ¿Qué opinión te merece su afirmación?", "o": ["Sí estoy de acuerdo porque el entorno de lectura presenta particularidades similares", "No estoy de acuerdo porque el entorno de lectura presenta particularidades diferentes"], "c": 1, "multi": false}, {"t": "De las siguientes, ¿cuál característica representa al hipertexto?", "o": ["Escritura no secuencial", "Escritura secuencial o lineal"], "c": 0, "multi": false}, {"t": "¿Qué concepciones deben tenerse en cuenta a la hora de analizar un libro de texto?", "o": ["Respecto a los conocimientos, a la perspectiva pedagógica y a la concepción del mundo", "Elegir el libro por el color de su presentación"], "c": 0, "multi": false}, {"t": "Buscás información en la web para comprarte una computadora nueva y analizás la memoria, el Windows y otras características técnicas para evaluar cuál es el mejor modelo a comprar. ¿Qué función de lectura se activa?", "o": ["La instrumental, porque decidirás qué PC comprar", "La cognoscitiva, porque satisface necesidades de información"], "c": 0, "multi": false}, {"t": "Si quisiéramos brindar alguna característica del hipertexto, ¿cuál de las siguientes afirmaciones nos serviría?", "o": ["Un texto que invita a un cambio cuantitativo en los procesos de lectura y construcción de conocimiento", "Un texto que invita a un cambio cualitativo en los procesos de lectura y construcción de conocimiento"], "c": 1, "multi": false}, {"t": "Lees en formato e-book una novela en la que la protagonista es una madre soltera, trabajadora, que inculca en sus hijos valores de respeto por los mayores y de amor por la familia. El personaje te recuerda a tu abuela. ¿Qué función de la lectura representa esa asociación y recuerdo?", "o": ["Socio-emocional, por la identificación", "Personal-social, por la identificación"], "c": 0, "multi": false}, {"t": "¿Cuál es el primer imperativo que debe aprender un usuario crítico para poder interactuar en internet?", "o": ["Aprender a evaluar la credibilidad de la información que obtiene", "Buscar que la bibliografía, los papers y las páginas web sean de una fuente confiable"], "c": 0, "multi": false}, {"t": "¿Cuáles son los cambios que implica la evolución de la lectura en papel a la lectura en entornos digitales?", "o": ["Cualitativos", "Cuantitativos", "Cualitativos y cuantitativos"], "c": 2, "multi": false}, {"t": "¿Cuál de las funciones de la lectura implica el desarrollo de la imaginación?", "o": ["Función social", "Función ideológica", "Función creativa"], "c": 2, "multi": false}, {"t": "El libro de texto es una unidad portadora de sentidos explícitos e implícitos que representan un fragmento seleccionado del conocimiento que se ha de aprender desde una perspectiva particular.", "o": ["Verdadero", "Falso"], "c": 0, "multi": false}, {"t": "La lectura pasiva es menos criteriosa y requiere menor esfuerzo que la lectura activa.", "o": ["Verdadero", "Falso"], "c": 0, "multi": false}, {"t": "¿Cuál de las siguientes características definen a un crítico de la información, un hiperlector? Marque las 4 opciones correctas", "o": ["No le interesa que sean de fuentes confiables", "Hace continuas comparaciones y se forma opiniones sobre la credibilidad", "Formula preguntas sobre lo que encuentra y no encuentra", "Va más allá de lo que descubre por casualidad y llega a lo que está oculto", "Emplea las relaciones entrelazadas de internet para ganar credibilidad"], "c": [1, 2, 3, 4], "multi": true, "n": 4}, {"t": "¿La función cognoscitiva de la lectura en entornos digitales, a qué necesidad responde?", "o": ["Necesidades de información, comunicación y trabajo", "Necesidades de comunicación, aprendizaje y trabajo", "Necesidades de información, aprendizaje y trabajo"], "c": 2, "multi": false}, {"t": "En el comité de profesores de la materia Introducción a la Psicología, un grupo de docentes insiste en incluir como bibliografía básica un libro sobre psicoanálisis mientras que textos que tratan sobre otras escuelas quedarían como material optativo. ¿Qué característica del libro de texto representa esta elección?", "o": ["Un punto de vista particular, porque ofrece un enfoque o perspectiva pedagógica particular", "Un punto de vista particular, porque selecciona un paradigma para enseñar", "Un punto de vista general, porque selecciona varios paradigmas para enseñar"], "c": 1, "multi": false}, {"t": "De las funciones de la lectura en entornos digitales, ¿cuál es aquella que integra al lector en una comunidad al identificarse con sus personajes?", "o": ["Comunicación", "Socialización", "Información"], "c": 1, "multi": false}, {"t": "Al incorporar tecnologías para la enseñanza, ¿qué debe considerar el docente?", "o": ["Objetivos de aprendizaje y métodos de enseñanza pertinentes", "Objetivos de enseñanza y métodos de aprendizaje pertinentes", "Objetivos de aprendizaje y criterios de enseñanza pertinentes"], "c": 0, "multi": false}, {"t": "¿Qué implica que algunas personas queden excluidas de las TIC?", "o": ["Brecha digital", "Brecha socioeconómica", "Brecha tecnológica", "Brecha comunicacional"], "c": 0, "multi": false}, {"t": "El profesor de ciencias pidió la realización de una investigación sobre los nuevos métodos de conservación de especies en extinción en la provincia. Al respecto, Diego encontró un montón de información pero tuvo que ser cuidadoso con la selección de las fuentes, puesto que muchas páginas web tenían nte", "A las redes donde los miembros no tienen en común ciertas prácticas"], "c": 0, "multi": false}, {"t": "¿Cuál de las siguientes es una característica del chat pensando en la comunicación mediada tecnológicamente?", "o": ["Se da en tiempo asincrónico, no tiene coordinador o moderador, los participantes no necesariamente se conocen", "Tiempo asincrónico o ficticio, todos los participantes se conocen, tiene coordinador o moderador", "Tiempo sincrónico o real, no tiene coordinador o moderador, los participantes no necesariamente se conocen, se utilizan apodos o nicknames"], "c": 2, "multi": false}, {"t": "¿Cuál de las siguientes acciones puede realizar el docente cuando realiza intervenciones en el chat?", "o": ["Realizar preguntas a cada uno, o a alguno de los alumnos", "No realizar preguntas a cada uno, o a alguno de los alumnos"], "c": 0, "multi": false}, {"t": "El profesor de inglés está pensando una actividad con la que promover el diálogo en tiempo real en ese idioma con los estudiantes del último año. Para ello ha pensado en utilizar el chat del aula virtual. ¿Qué actividades cree que podría realizar a través de ese medio? Seleccione 4 opciones correctas", "o": ["Preguntar y repreguntar", "Hacer una pregunta dirigida para que un alumno puntual responda", "Hacer una pregunta para esperar que los alumnos respondan", "Intervenir a partir de lo dicho por un alumno para retomarlo", "Responder preguntas para atender inquietudes de los alumnos"], "c": [1, 2, 3, 4], "multi": true, "n": 4}, {"t": "Dentro de la comunicación mediada tecnológicamente encontramos una modalidad que generalmente mantiene un intercambio de textos de tipo epistolar. ¿Cuál es esta modalidad?", "o": ["El chat", "El correo electrónico", "El foro de discusión"], "c": 1, "multi": false}, {"t": "El chat permite que", "o": ["El alumno realice preguntas a algún alumno o a muchos", "El profesor realice preguntas a algún alumno o a muchos"], "c": 1, "multi": false}, {"t": "El rol del docente en el foro es", "o": ["Recapitulación reconstructiva", "Recapitulación constructiva", "Recapitulación objetiva"], "c": 0, "multi": false}, {"t": "La profesora de Historia está diseñando un curso virtual y para ello ha construido una línea de tiempo digital que permite a los alumnos acceder a una síntesis visual y cronológica sobre los hechos más importantes de la historia argentina. ¿Qué área de estudio representa su actividad?", "o": ["Estrategias de consolidación, porque vincula a María con las actividades", "Uso de medios y recursos tecnológicos", "Estrategias de apropiación, porque vincula a María con el contenido"], "c": 1, "multi": false}, {"t": "De las actitudes respecto al texto que se va a leer, ¿qué implica el compromiso?", "o": ["La lectura activa", "La lectura activa y pasiva", "La lectura pasiva"], "c": 0, "multi": false}, {"t": "Pablo es un alumno a distancia de Abogacía. Hace unos meses comenzó el cursado y tiene algunas dudas, por lo que necesita hablar directamente con su profesor para pedirle ayuda. ¿Qué medio le recomendaría que utilizara dentro del entorno virtual?", "o": ["El chat porque permite la comunicación sincrónica", "El foro porque permite la comunicación con sus pares y profesor", "El correo electrónico porque permite la comunicación privada"], "c": 2, "multi": false}, {"t": "¿Qué implica el impulso del aprendizaje electrónico?", "o": ["La educación y capacitación a través de internet y permite la interacción con el material de estudio mediante la utilización de herramientas informáticas", "El desarrollo y ejecución de redes y medidas de desempeño del progreso y de innovación en el aprendizaje electrónico"], "c": 1, "multi": false}, {"t": "El primer día de cursado en la plataforma virtual el profesor de Matemática necesita comunicarles a sus alumnos las condiciones de regularidad y promoción de la materia. Para evitar confusiones y poder atender a inquietudes, necesita que esa instancia sea lo más cercana posible a una presencial. ¿Qué medio le recomendarías utilizar?", "o": ["El chat, porque sucede en tiempo real", "El correo electrónico, porque no sucede en tiempo real", "El foro, porque se pueden intercambiar opiniones"], "c": 0, "multi": false}, {"t": "Podemos afirmar que quienes trabajan en el ciberespacio se ven beneficiados por una variedad de experiencias y oportunidades sustancialmente diferentes de quienes no lo hacen. ¿Cuáles son estas? Marque las 4 opciones correctas", "o": ["Tendrán más posibilidades de aprender a usar la red para sus propios objetivos", "Logran notoriedad e influencia potencial dentro de una red global", "Aumentan su nivel de competencia", "Tendrán una identidad cibernética para otros usuarios conectados en la red", "Podrán participar dentro de las comunidades más amplias que les permite la red"], "c": [0, 1, 3, 4], "multi": true, "n": 4}, {"t": "Para presentar un análisis de la deserción escolar, la directora del CENMA ASIMRA realizó un estado del arte, para ver cómo otras instituciones abordan la misma problemática. Al iniciar su investigación se encontró con un gran problema: vio mucha información en la web y no supo qué seleccionar. ¿Qué cambio sustancial en la evolución de la lectura implica?", "o": ["Cuantitativo, porque accede a un gran volumen de información", "Cualitativo, porque accede a un gran volumen de información"], "c": 0, "multi": false}, {"t": "¿Cuál es el elemento que vincula e integra lo impreso y lo digital en el campo educativo?", "o": ["La lectura", "La tecnología", "La escritura"], "c": 0, "multi": false}, {"t": "¿Cuál es el tipo de usuario que tiene una actitud activa y es especializado en los entornos digitales?", "o": ["Navegador", "El hiperlector", "Usuario"], "c": 1, "multi": false}, {"t": "En la práctica con tecnologías educativas, existe una que es la más tradicional. ¿De cuál se trata?", "o": ["Libro de texto", "Computadoras", "Imprenta"], "c": 0, "multi": false}, {"t": "¿Cuáles son las clases de lectores en los entornos virtuales? Marque 3 opciones correctas", "o": ["Usuarios", "Hiperlectores", "Navegadores", "Especializados"], "c": [0, 1, 2], "multi": true, "n": 3}, {"t": "¿Qué dimensiones es necesario tener en cuenta en la aplicación de tecnologías en los procesos de enseñanza? Marque 2 opciones correctas", "o": ["Acceso abierto", "Entorno virtual", "Comunicación", "Acceso técnico"], "c": [1, 2], "multi": true, "n": 2}]}, {"title": "Didáctica y tríada · Mediadores, silenciada/silenciosa", "questions": [{"t": "¿Cuáles son los elementos que componen la tríada didáctica? Selecciona 3 opciones correctas", "o": ["Docente", "Didáctica", "Contenido", "Tecnología", "Alumno"], "c": [0, 2, 4], "multi": true, "n": 3}, {"t": "Néstor está diseñando un curso virtual sobre estrategias y métodos de estudio para los alumnos universitarios. Como parte del proceso, necesita que los cursantes puedan compartir en un espacio sus experiencias y debatir en torno a las mejores formas de estudiar. ¿Qué mediador pedagógico le recomendaría utilizar?", "o": ["El chat, porque es el espacio ideal para el debate e intercambio", "El foro, porque es el espacio ideal para el debate e intercambio", "El correo electrónico, porque es el espacio ideal para el debate e intercambio"], "c": 1, "multi": false}, {"t": "¿Cuáles son las situaciones más comunes respecto a los desfasajes que repercuten en el uso eficiente y eficaz de mediadores pedagógicos? Marque 2 opciones correctas", "o": ["La didáctica silenciosa", "La tecnología silenciosa", "La tecnología silenciada", "La didáctica silenciada"], "c": [0, 2], "multi": true, "n": 2}, {"t": "¿En los años 80, qué diferenciaba a la tecnología en educación de la didáctica?", "o": ["Introducción de tecnología en las prácticas educativas", "Introducción de comunicaciones en las prácticas educativas", "Introducción de mediadores en las prácticas educativas"], "c": 2, "multi": false}, {"t": "¿Qué tipos de diseños implementa la didáctica en su funcionamiento? Marque 4 opciones correctas", "o": ["Uso de let currentMateria = 'filosofia';
let currentTanda = 0;
let answered = [];
let correctCount = 0;
let incorrectCount = 0;
let questionOrder = [];  // permutación de las preguntas dentro de la tanda actual

function switchMateria(m) {
  currentMateria = m;
  currentTanda = 0;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + m).classList.add('active');
  // Cambiar colores
  const mat = MATERIAS[m];
  document.documentElement.style.setProperty('--primary', mat.color1);
  document.documentElement.style.setProperty('--primary-dark', mat.color2);
  document.documentElement.style.setProperty('--accent', mat.accent);
  document.documentElement.style.setProperty('--bg', m === 'filosofia' ? '#f4ecf7' : '#e8f4fa');
  document.documentElement.style.setProperty('--border', m === 'filosofia' ? '#d7bde2' : '#bdd7e8');
  document.getElementById('hdrTitle').textContent = mat.icon + ' Simulador PRO · ' + mat.nombre;
  document.getElementById('hdrSub').textContent = mat.subtitulo;
  rebuildTandaSelect();
  reiniciar();
}

function rebuildTandaSelect() {
  const sel = document.getElementById('tanda');
  sel.innerHTML = '';
  const mat = MATERIAS[currentMateria];
  mat.tandas.forEach((t, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = 'Tanda ' + (i+1) + ': ' + t.title + ' (' + t.questions.length + ')';
    sel.appendChild(opt);
  });
}

function cambiarTanda() {
  currentTanda = parseInt(document.getElementById('tanda').value);
  reiniciar();
}

function reiniciar() {
  const t = MATERIAS[currentMateria].tandas[currentTanda];
  // Si es tanda random: regenerar selección de 20 preguntas
  if (t.random) {
    const allQs = [];
    MATERIAS[currentMateria].tandas.forEach(tt => {
      if (!tt.random) allQs.push(...tt.questions);
    });
    for (let i = allQs.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [allQs[i], allQs[j]] = [allQs[j], allQs[i]];
    }
    t.questions = allQs.slice(0, 20);
  }
  // Mezclar orden de las preguntas
  questionOrder = Array.from({length: t.questions.length}, (_, i) => i);
  for (let i = questionOrder.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [questionOrder[i], questionOrder[j]] = [questionOrder[j], questionOrder[i]];
  }
  answered = new Array(t.questions.length).fill(null);
  correctCount = 0;
  incorrectCount = 0;
  document.getElementById('summary').style.display = 'none';
  renderQuestions();
  updateStats();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function renderQuestions() {
  const t = MATERIAS[currentMateria].tandas[currentTanda];
  const container = document.getElementById('questions');
  container.innerHTML = '';
  questionOrder.forEach((origIdx, idx) => {
    const q = t.questions[origIdx];
    // Permutación nueva de las opciones para esta render
    const order = Array.from({length: q.o.length}, (_, i) => i);
    for (let i = order.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [order[i], order[j]] = [order[j], order[i]];
    }

    const div = document.createElement('div');
    div.className = 'question';
    div.id = 'q' + idx;
    let multiHint = '';
    if (q.multi) {
      multiHint = '<span class="multi-hint">Seleccioná ' + q.n + ' opciones</span>';
    }
    let html = '<span class="num">#' + (idx + 1) + '</span>' + multiHint;
    html += '<div class="qtext">' + escapeHtml(q.t) + '</div>';
    html += '<div class="options" id="opts' + idx + '">';
    order.forEach(originalIdx => {
      const inputType = q.multi ? 'checkbox' : 'radio';
      html += '<label class="option" data-idx="' + originalIdx + '">';
      html += '<input type="' + inputType + '" name="q' + idx + '" value="' + originalIdx + '" onchange="onOptChange(' + idx + ')"> ';
      html += escapeHtml(q.o[originalIdx]);
      html += '</label>';
    });
    html += '</div>';
    html += '<div class="controls-q">';
    html += '<button class="btn-check" id="btn' + idx + '" onclick="checkAnswer(' + idx + ')" disabled>Verificar</button>';
    html += '</div>';
    div.innerHTML = html;
    container.appendChild(div);
  });
}

function onOptChange(idx) {
  document.getElementById('btn' + idx).disabled = false;
}

function checkAnswer(idx) {
  if (answered[idx] !== null) return;
  const origIdx = questionOrder[idx];
  const q = MATERIAS[currentMateria].tandas[currentTanda].questions[origIdx];
  const inputs = document.querySelectorAll('input[name="q' + idx + '"]:checked');
  const selected = Array.from(inputs).map(i => parseInt(i.value));
  let isCorrect = false;
  let correctIdx = q.multi ? q.c : [q.c];

  if (q.multi) {
    const sel = selected.sort();
    const cor = [...correctIdx].sort();
    isCorrect = sel.length === cor.length && sel.every((v, i) => v === cor[i]);
  } else {
    isCorrect = selected.length === 1 && selected[0] === q.c;
  }

  answered[idx] = isCorrect;
  if (isCorrect) correctCount++;
  else incorrectCount++;

  const opts = document.querySelectorAll('#opts' + idx + ' .option');
  opts.forEach((label) => {
    const input = label.querySelector('input');
    const originalIdx = parseInt(input.value);
    input.disabled = true;
    label.classList.add('disabled');
    if (correctIdx.includes(originalIdx)) {
      label.classList.add('correct');
    } else if (selected.includes(originalIdx)) {
      label.classList.add('incorrect');
    }
  });

  document.getElementById('btn' + idx).disabled = true;
  document.getElementById('btn' + idx).textContent = isCorrect ? '✓ Correcta' : '✗ Incorrecta';

  updateStats();
  checkFinal();
}

function updateStats() {
  document.getElementById('ok').textContent = correctCount;
  document.getElementById('no').textContent = incorrectCount;
  const total = MATERIAS[currentMateria].tandas[currentTanda].questions.length;
  const done = correctCount + incorrectCount;
  document.getElementById('prog').textContent = Math.round(100 * done / total) + '%';
  if (done > 0) {
    document.getElementById('nota').textContent = (10 * correctCount / done).toFixed(1);
  } else {
    document.getElementById('nota').textContent = '—';
  }
}

function checkFinal() {
  const total = MATERIAS[currentMateria].tandas[currentTanda].questions.length;
  if (correctCount + incorrectCount === total) {
    const nota = (10 * correctCount / total).toFixed(1);
    document.getElementById('finalNota').textContent = nota + ' / 10';
    document.getElementById('finalDetalle').textContent =
      correctCount + ' correctas · ' + incorrectCount + ' incorrectas · ' + total + ' totales';
    let msg = '';
    if (nota >= 8) msg = '✨ Excelente. Estás bien preparado para esta tanda.';
    else if (nota >= 6) msg = '👍 Aprobado. Repasá los errores y seguí con la siguiente.';
    else if (nota >= 4) msg = '📚 Cerca. Hay temas que necesitan más vueltas.';
    else msg = '🔁 Repasá los autores/conceptos de esta tanda antes de seguir.';
    document.getElementById('finalMsg').textContent = msg;
    document.getElementById('summary').style.display = 'block';
    document.getElementById('summary').scrollIntoView({behavior: 'smooth', block: 'start'});
  }
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

switchMateria('filosofia');
</script>
